      if (mv.pow > 0) {
        let dmgInfo = calcDamage(atkSide, defSide, mv === DATA.MOVES.STRUGGLE ? { id: 'STRUGGLE' } : move);
        let { dmg, crit, eff } = dmgInfo;
        if (eff === 0) { await say('זה בכלל לא משפיע על ' + defSide.mon.name + '...'); return; }
        if (mv.condPow && m.hp / m.maxhp <= mv.condPow.belowFrac) {
          dmg = Math.floor(dmg * mv.condPow.mul);
          await say(m.name + ' נלחם כשגבו אל הקיר!');
        }
        const hits = mv.multi ? ENG.ri(mv.multi[0], mv.multi[1]) : 1;
        let total = 0;
        for (let h = 0; h < hits && defSide.mon.hp > 0; h++) {
          if (h === 0) await lunge(atkSide);
          AUD.sfx(eff > 1 ? 'superhit' : eff < 1 ? 'weakhit' : 'hit');
          fxBurst(mv.type, defSide);
          await blink(defSide);
          let hitDmg = h === 0 ? dmg : Math.max(1, Math.floor(dmg * (0.85 + Math.random() * 0.3)));
          // absorb shield takes damage first
          if (defSide.shieldHP > 0) {
            const absorbed = Math.min(defSide.shieldHP, hitDmg);
            defSide.shieldHP -= absorbed; hitDmg -= absorbed;
            if (absorbed > 0) await say('המגן של ' + defSide.mon.name + ' ספג ' + absorbed + ' נזק!');
            if (defSide.shieldHP <= 0) await say('המגן נשבר!');
          }
          if (hitDmg > 0) await animHP(defSide, defSide.mon.hp - hitDmg);
          total += hitDmg;
          if (hits > 1) await ENG.wait(6);
        }
        if (hits > 1) await say('פגע ' + hits + ' פעמים!');
        if (crit) await say('פגיעה קריטית! ישר לכותרות!');
        if (eff > 1) await say('סופר אפקטיבי!');
        if (eff < 1) await say('לא ממש אפקטיבי...');
        dmg = total;
        if (mv.drain && dmg > 0) {
          const heal = Math.max(1, Math.floor(dmg * mv.drain));
          if (m.hp < m.maxhp) { await animHP(atkSide, m.hp + heal); await say(m.name + ' שאב תקציבים מהיריב!'); }
        }
        if (mv.recoil && dmg > 0) {
          const rec = Math.max(1, Math.floor(dmg * mv.recoil));
          await animHP(atkSide, m.hp - rec);
          await say(m.name + ' נפגע מהריקושטים!');
        }
        if (mv.bothHurt && dmg > 0 && m.hp > 0) {
          const rec = Math.max(1, Math.floor(dmg * mv.bothHurt));
          await animHP(atkSide, m.hp - rec);
          await say('ההדף פגע גם ב' + m.name + '!');
        }
        // secondary effects on a live target
        if (defSide.mon.hp > 0) {
          const dTypes = DATA.SPECIES[defSide.mon.species].types;
          if (mv.brn && !defSide.mon.status && !dTypes.includes('FIRE') && Math.random() < mv.brn) {
            defSide.mon.status = 'BRN'; await say(defSide.mon.name + ' נכווה בסערה תקשורתית!');
          }
          if (mv.par && mv.pow > 0 && !defSide.mon.status && !dTypes.includes('ELECTRIC') && Math.random() < mv.par) {
            defSide.mon.status = 'PAR'; await say(defSide.mon.name + ' משותק! אולי לא יגיב!');
          }
          if (mv.psn && !defSide.mon.status && !dTypes.includes('POISON') && Math.random() < mv.psn) {
            defSide.mon.status = 'PSN'; await say(defSide.mon.name + ' הורעל בהדלפות!');
          }
          if (mv.conf && defSide.conf <= 0 && Math.random() < mv.conf) {
            defSide.conf = ENG.ri(2, 4);
            await say(defSide.mon.name + ' מבולבל לגמרי!');
          }
          if (mv.flinch && Math.random() < mv.flinch) defSide.flinched = true;
          if (mv.stat && mv.stat.who === 'foe' && Math.random() < (mv.stat.chance || 1)) {
            await applyStatStage(defSide, mv.stat.stat, mv.stat.delta, (mv.stat.chance || 1) < 1);
          }
          if (mv.haze) await clearStages(defSide);
          if (mv.breakProt && (defSide.prot > 0 || defSide.shieldHP > 0)) {
            defSide.prot = 0; defSide.shieldHP = 0;
            await say('ההגנות של ' + defSide.mon.name + ' בוטלו ברפורמה!');
          }
        }
        if (mv.stat && mv.stat.who === 'self' && Math.random() < (mv.stat.chance || 1)) {
          await applyStatStage(atkSide, mv.stat.stat, mv.stat.delta, (mv.stat.chance || 1) < 1);
        }
      } else {
        /* ---- status move ---- */
        fxBurst(mv.type, mv.stat && mv.stat.who === 'self' || mv.prot || mv.shield || mv.buffAll || mv.teamHeal || mv.lowBuff || mv.revive1 ? atkSide : defSide);
        let did = false;
        if (mv.prot) { atkSide.prot = mv.prot + 1; await say(m.name + ' עטף את עצמו בחסינות מוחלטת!'); did = true; }
        if (mv.shield) {
          atkSide.shieldHP = Math.max(atkSide.shieldHP, Math.floor(m.maxhp * mv.shield));
          await say(m.name + ' פרש מגן של ' + atkSide.shieldHP + ' נזק!'); did = true;
        }
        if (mv.buffAll) {
          for (const s of ['atk', 'def', 'spa', 'spd', 'spe']) atkSide.stages[s] = Math.min(6, atkSide.stages[s] + mv.buffAll);
          AUD.sfx('statup');
          await say('כל הסטטיסטיקות של ' + m.name + ' עלו! מינוי מוצלח!'); did = true;
        }
        if (mv.lowBuff) {
          if (m.hp / m.maxhp <= 0.5) { await applyStatStage(atkSide, mv.lowBuff.stat, mv.lowBuff.delta); did = true; }
          else if (!did) { await say(m.name + ' מתלונן שכולם נגדו. אין אפקט... בינתיים.'); did = true; }
        }
        if (mv.teamHeal) {
          let healed = false;
          for (const pm of (atkSide.isPlayer ? G.party : enemyParty)) {
            if (pm.hp > 0 && pm.hp < pm.maxhp) { pm.hp = Math.min(pm.maxhp, pm.hp + Math.floor(pm.maxhp * mv.teamHeal)); pm.status = null; healed = true; }
          }
          if (atkSide.mon.hp > 0) atkSide.dispHP = atkSide.mon.hp;
          AUD.jingle('itemJ');
          await say(healed ? 'כל הקואליציה של ' + m.name + ' התאוששה!' : 'אין את מי לרפא!'); did = true;
        }
        if (mv.healPerAlly) {
          const allies = (atkSide.isPlayer ? G.party : enemyParty).filter(x => x.hp > 0).length;
          const heal = Math.floor(m.maxhp * 0.12 * allies);
          await animHP(atkSide, m.hp + heal);
          await say('העם עומד מאחורי ' + m.name + '! התאושש ' + heal + ' נקודות!'); did = true;
        }
        if (mv.hpSwap) {
          const pFrac = m.hp / m.maxhp, eFrac = defSide.mon.hp / defSide.mon.maxhp;
          if (pFrac < eFrac) {
            const newSelf = Math.max(1, Math.floor(m.maxhp * eFrac));
            const newFoe = Math.max(1, Math.floor(defSide.mon.maxhp * pFrac));
            await animHP(atkSide, newSelf); await animHP(defSide, newFoe);
            await say(m.name + ' סגר עסקה! החוסן הוחלף!');
          } else await say('העסקה לא השתלמה. בוטלה בציוץ.');
          did = true;
        }
        if (mv.skipHeal) {
          const heal = Math.floor(m.maxhp * mv.skipHeal);
          await animHP(atkSide, m.hp + heal);
          await say(m.name + ' נרדם באמצע הפסגה והתאושש ' + heal + ' נקודות.'); did = true;
        }
        if (mv.revive1) {
          if (!atkSide.revived) { atkSide.revived = true; await say(m.name + ' הכריז: אם אפול — אני חוזר לפוליטיקה!'); }
          else await say(m.name + ' כבר הבטיח לחזור. פעם אחת מספיקה.');
          did = true;
        }
        if (mv.flee) {
          if (!st.trainer && atkSide.isPlayer) { AUD.sfx('flee'); await say(m.name + ' פרש מהחיים הפוליטיים! (ברח מהקרב)'); return finish('ran'); }
          await say(m.name + ' ניסה לפרוש, אבל אין לאן!'); did = true;
        }
        if (mv.ohkoRisk) {
          if (m.hp / m.maxhp < 0.2) {
            await say(m.name + ' לחץ על הכפתור האדום!!');
            st.fx.shake = 10; AUD.sfx('superhit');
            fxBurst('DARK', defSide); fxBurst('FIRE', defSide);
            await animHP(defSide, 0); await animHP(atkSide, 0);
          } else { await say(m.name + ' שקל את הכפתור... ונרתע. עוד מוקדם.'); }
          did = true;
        }
        if (mv.slp) {
          if (defSide.mon.status) { await say('אבל זה נכשל!'); }
          else { defSide.mon.status = 'SLP'; defSide.mon.sleepTurns = ENG.ri(1, 3); await say(defSide.mon.name + ' נרדם עמוק!'); }
          did = true;
        } else if (mv.par && !mv.pow) {
          if (defSide.mon.status) { await say('אבל זה נכשל!'); }
          else if (DATA.SPECIES[defSide.mon.species].types.includes('ELECTRIC')) { await say('זה לא משפיע על ' + defSide.mon.name + '...'); }
          else { defSide.mon.status = 'PAR'; await say(defSide.mon.name + ' משותק פוליטית!'); }
          did = true;
        } else if (mv.psn && !mv.pow) {
          if (defSide.mon.status) await say('אבל זה נכשל!');
          else { defSide.mon.status = 'PSN'; await say(defSide.mon.name + ' הורעל!'); }
          did = true;
        } else if (mv.conf && !mv.pow && !did) {
          if (defSide.conf > 0) await say(defSide.mon.name + ' כבר מבולבל מספיק!');
          else if (Math.random() * 100 < mv.acc) { defSide.conf = ENG.ri(2, 4); await say(defSide.mon.name + ' מבולבל לגמרי!'); }
          else await say('זה לא עבד הפעם!');
          did = true;
        }
        if (mv.haze && !mv.pow) { await clearStages(defSide); did = true; }
        if (mv.breakProt && !mv.pow && (defSide.prot > 0 || defSide.shieldHP > 0)) {
          defSide.prot = 0; defSide.shieldHP = 0;
          await say('ההגנות של ' + defSide.mon.name + ' בוטלו!'); did = true;
        }
        if (mv.stat && !did) {
          const target = mv.stat.who === 'self' ? atkSide : defSide;
          await applyStatStage(target, mv.stat.stat, mv.stat.delta);
        } else if (mv.stat && mv.stat.who === 'self' && did) {
          await applyStatStage(atkSide, mv.stat.stat, mv.stat.delta, true);
        }
      }
    }

    async function clearStages(side) {
      let any = false;
      for (const s in side.stages) { if (side.stages[s] !== 0) any = true; side.stages[s] = 0; }
      if (any) await say('כל שינויי הסטטיסטיקות של ' + side.mon.name + ' נמחקו!');
    }

    async function endOfTurn(side) {
      const m = side.mon;
      if (!m || m.hp <= 0) return;
      if (side.prot > 0) {
        side.prot--;
        if (side.prot === 0) await say('החסינות של ' + m.name + ' פגה!');
      }
      if (m.status === 'PSN') {
        await say(m.name + ' סובל מהרעלת תקשורת!');
        AUD.sfx('weakhit');
        await animHP(side, m.hp - Math.max(1, Math.floor(m.maxhp / 8)));
      } else if (m.status === 'BRN') {
        await say(m.name + ' נשרף בטוויטר!');
        AUD.sfx('weakhit');
        await animHP(side, m.hp - Math.max(1, Math.floor(m.maxhp / 8)));
      }
    }

    /* ---------- exp & levels ---------- */
    async function giveExp() {
      const foe = E.mon;
      const parts = [...st.participants].filter(i => G.party[i] && G.party[i].hp > 0);
      if (!parts.length) return;
      const each = Math.max(1, Math.floor(DATA.expGain(foe, !!st.trainer) / parts.length));
      for (const i of parts) {
        const m = G.party[i];
        if (m.level >= DATA.MAXLEVEL) continue;
        await say(m.name + ' קיבל ' + each + ' נקודות ניסיון!');
        m.exp += each;
        while (m.level < DATA.MAXLEVEL && m.exp >= DATA.expForLevel(m.level + 1)) {
          m.level++;
          const oldMax = m.maxhp;
          DATA.calcStats(m);
          m.hp = Math.min(m.maxhp, m.hp + (m.maxhp - oldMax));
          AUD.jingle('levelup');
          if (m === P.mon) fxStars(P);
          await say(m.name + ' עלה לרמה ' + m.level + '!');
          for (const learn of DATA.movesLearnedAtLevel(m.species, m.level)) await learnMove(m, learn);
          const evo = DATA.SPECIES[m.species].evo;
          if (evo && m.level >= evo.at && !st.evolveQueue.some(q => q.mon === m)) {
            st.evolveQueue.push({ mon: m, to: evo.to });
          }
        }
      }
    }
    async function learnMove(m, moveId) {
      if (m.moves.some(x => x.id === moveId)) return;
      const mv = DATA.MOVES[moveId];
      if (m.moves.length < 4) {
        m.moves.push({ id: moveId, pp: mv.pp, maxpp: mv.pp });
        AUD.jingle('itemJ');
        await say(m.name + ' למד את "' + mv.name + '"!');
        return;
      }
      const yes = await UI.ask(m.name + ' רוצה ללמוד את "' + mv.name + '". לשכוח מהלך ישן?', ['כן', 'לא']);
      if (yes === 0) {
        const pickIdx = await UI.menu(m.moves.map(x => DATA.MOVES[x.id].name), { x: 92, y: 40 });
        if (pickIdx >= 0) {
          const old = DATA.MOVES[m.moves[pickIdx].id].name;
          m.moves[pickIdx] = { id: moveId, pp: mv.pp, maxpp: mv.pp };
          await say('אחת, שתיים ו... פוף! ' + m.name + ' שכח את "' + old + '" ולמד את "' + mv.name + '"!');
          return;
        }
      }
      await say(m.name + ' ויתר על "' + mv.name + '". אולי בקדנציה הבאה.');
    }

    /* ---------- catching ---------- */
    async function throwBall(itemId) {
      const item = DATA.ITEMS[itemId];
      if (st.trainer) { await say('אי אפשר לגייס פוליטיקאי של מאמן אחר! זו עריקה!'); return false; }
      if (G.party.length >= 6) { await say('הקואליציה מלאה! 6 חברים זה המקסימום שמחזיק.'); return false; }
      G.bag[itemId]--; if (G.bag[itemId] <= 0) delete G.bag[itemId];
      await say(G.name + ' זרק ' + item.name + '!');
      AUD.sfx('throwB');
      st.ball = { t: 0, phase: 'fly', wob: 0 };
      await ENG.tween(st.ball, 't', 1, 22);
      // absorb
      st.ball.phase = 'absorb';
      G.flash = true; await ENG.wait(4); G.flash = false;
      await ENG.tween(E, 'scale', 0, 14);
      E.visible = false;
      st.ball.phase = 'drop';
      await ENG.wait(14);
      // shake checks (gen-3 style)
      const m = E.mon;
      const rate = DATA.SPECIES[m.species].catch;
      const statusBonus = m.status === 'SLP' ? 2 : m.status ? 1.5 : 1;
      let a = Math.floor((3 * m.maxhp - 2 * m.hp) * rate * item.val / (3 * m.maxhp)) * statusBonus;
      a = Math.max(1, Math.floor(a));
      let shakes = 0;
      if (a >= 255) shakes = 4;
      else {
        const b = Math.floor(1048560 / Math.floor(Math.sqrt(Math.sqrt(Math.floor(16711680 / a)))));
        for (let i = 0; i < 4; i++) if (Math.floor(Math.random() * 65536) < b) shakes++; else break;
      }
      for (let i = 0; i < Math.min(3, shakes); i++) {
        await ENG.wait(24);
        AUD.sfx('wobble');
        st.ball.wob = (i % 2 === 0) ? 1 : -1;
        await ENG.wait(12);
        st.ball.wob = 0;
      }
      await ENG.wait(20);
      if (shakes >= 4) {
        AUD.sfx('click');
        st.ball.phase = 'caught';
        AUD.jingle('catchJ');
        await say('נבחר! ' + m.name + ' הצטרף לקואליציה שלך!');
        G.dex.caught[m.species] = true;
        m.hp = Math.max(1, m.hp);
        G.party.push(m);
        SCN.checkAchievements && SCN.checkAchievements('catch');
        st.ball = null;
        return true;
      }
      // breakout
      st.ball = null;
      E.visible = true;
      await ENG.tween(E, 'scale', 1, 8);
      AUD.cry(m.species);
      const msgs = ['הוא ברח מהקלפי! פסילת קולות!', 'כמעט! הוא דרש ספירה חוזרת!', 'אוף! הוא ערער לוועדת הבחירות!', 'היה כל כך קרוב! בג״ץ ביטל!'];
      await say(msgs[Math.min(shakes, 3)]);
      return false;
    }

    /* ---------- switching ---------- */
    async function sendPlayer(idx, quiet) {
      P = mkSide(G.party[idx], true);
      P.offX = -110;
      st.playerIdx = idx;
      st.participants.add(idx);
      if (!quiet) await say('קדימה, ' + P.mon.name + '! הבמה שלך!');
      AUD.cry(P.mon.species);
      fxSummon(P);
      P.scale = 0.2;
      ENG.tween(P, 'scale', 1, 14);
      await ENG.tween(P, 'offX', 0, 14);
    }
    async function sendEnemy(idx) {
      E = mkSide(enemyParty[idx], false);
      E.offX = 120;
      enemyIdx = idx;
      st.participants = new Set([st.playerIdx]);
      G.dex.seen[E.mon.species] = true;
      if (st.trainer) { await say(st.trainer.name + ' שולח את ' + E.mon.name + '!'); fxSummon(E); E.scale = 0.2; ENG.tween(E, 'scale', 1, 14); }
      AUD.cry(E.mon.species);
      await ENG.tween(E, 'offX', 0, 16);
    }

    /* ---------- AI ---------- */
    function enemyMove() {
      const usable = E.mon.moves.filter(mv => mv.pp > 0);
      if (!usable.length) return { id: 'STRUGGLE', pp: 1, maxpp: 1 };
      if (!st.trainer) return ENG.pick(usable);
      let best = null, bestScore = -1;
      for (const mv of usable) {
        const d = DATA.MOVES[mv.id];
        let score = 5 + Math.random() * 20;
        if (d.pow > 0) {
          const eff = DATA.effectiveness(d.type, DATA.SPECIES[P.mon.species].types);
          const stab = DATA.SPECIES[E.mon.species].types.includes(d.type) ? 1.5 : 1;
          score = d.pow * eff * stab / 2 + Math.random() * 15;
        } else if (st.turnCount < 2) score = 30 + Math.random() * 10;
        if (score > bestScore) { bestScore = score; best = mv; }
      }
      return best;
    }

    /* ---------- main script ---------- */
    async function main() {
      await ENG.fadeIn(12);
      st.playerIdx = alivePlayerIdx();
      st.turnCount = 0;
      // intro
      if (st.trainer) {
        st.trainerVis = { offX: 120 };
        await ENG.tween(st.trainerVis, 'offX', 0, 18);
        await say(st.trainer.cls + ' ' + st.trainer.name + ' רוצה עימות!');
        await ENG.tween(st.trainerVis, 'offX', 130, 14);
        st.trainerVis = null;
        await sendEnemy(0);
      } else {
        E = mkSide(enemyParty[0], false);
        E.offX = 120;
        G.dex.seen[E.mon.species] = true;
        st.participants = new Set();
        await ENG.tween(E, 'offX', 0, 16);
        AUD.cry(E.mon.species);
        await say(cfg.kind === 'static' ? E.mon.name + ' תוקף!' : E.mon.name + ' פראי קופץ מהשיחים!');
      }
      await sendPlayer(st.playerIdx);

      /* -------- turn loop -------- */
      while (!st.over) {
        st.turnCount++;
        P.flinched = false; E.flinched = false;
        const action = await chooseAction();
        let playerMove = null, skipEnemy = false;

        if (action.type === 'run') {
          st.runAttempts++;
          if (st.trainer) { await say('אין בריחה מעימות פוליטי! המצלמות כאן!'); continue; }
          const f = Math.floor(P.mon.spe * 128 / Math.max(1, E.mon.spe)) + 30 * st.runAttempts;
          if (Math.random() * 256 < f) {
            AUD.sfx('flee');
            await say('ברחת בשלום! בלי תגובה לתקשורת!');
            return finish('ran');
          }
          await say('אי אפשר לברוח! חוסמים אותך!');
        } else if (action.type === 'switch') {
          await say('תחזור, ' + P.mon.name + '! הסיעה קוראת לך!');
          P.visible = false;
          await sendPlayer(action.idx);
        } else if (action.type === 'item') {
          const it = DATA.ITEMS[action.item];
          if (it.kind === 'ball') {
            const caught = await throwBall(action.item);
            if (caught) return finish('caught');
          } else {
            await useHealItem(action.item, action.target);
          }
        } else if (action.type === 'move') {
          playerMove = action.move;
        }

        // determine order
        const eMove = enemyMove();
        let order;
        if (playerMove) {
          const pPrio = DATA.MOVES[playerMove.id].prio || 0, ePrio = DATA.MOVES[eMove.id].prio || 0;
          const pSpe = P.mon.spe * (P.mon.status === 'PAR' ? 0.25 : 1) * stageMul(P.stages.spe);
          const eSpe = E.mon.spe * (E.mon.status === 'PAR' ? 0.25 : 1) * stageMul(E.stages.spe);
          const pFirst = pPrio !== ePrio ? pPrio > ePrio : (pSpe === eSpe ? Math.random() < 0.5 : pSpe > eSpe);
          order = pFirst ? [[P, E, playerMove], [E, P, eMove]] : [[E, P, eMove], [P, E, playerMove]];
        } else {
          order = [[E, P, eMove]];
        }

        for (const [atk, def, mv] of order) {
          if (st.over || atk.mon.hp <= 0 || def.mon.hp <= 0) continue;
          const usable = atk.mon.moves.filter(x => x.pp > 0);
          const finalMv = (mv.id !== 'STRUGGLE' && mv.pp <= 0)
            ? (usable.length ? usable[0] : { id: 'STRUGGLE', pp: 1, maxpp: 1 }) : mv;
          if (finalMv.id === 'STRUGGLE' && mv.id !== 'STRUGGLE') await say(atk.mon.name + ' has no moves left!');
          await execMove(atk, def, finalMv);
          if (def.mon.hp <= 0) { await onFaint(def); if (st.over) return; }
          if (atk.mon.hp <= 0) { await onFaint(atk); if (st.over) return; }
        }
        if (!st.over) {
          await endOfTurn(P);
          if (P.mon.hp <= 0) { await onFaint(P); if (st.over) return; }
          await endOfTurn(E);
          if (E.mon.hp <= 0) { await onFaint(E); if (st.over) return; }
        }
      }
    }

    async function useHealItem(itemId, targetIdx) {
      const it = DATA.ITEMS[itemId];
      const m = G.party[targetIdx != null ? targetIdx : st.playerIdx];
      G.bag[itemId]--; if (G.bag[itemId] <= 0) delete G.bag[itemId];
      if (it.kind === 'heal') {
        const heal = Math.min(it.val, m.maxhp - m.hp);
        if (m === P.mon) await animHP(P, m.hp + heal); else m.hp += heal;
        AUD.jingle('itemJ');
        await say(m.name + ' התאושש ב-' + heal + ' נקודות חוסן!');
      } else if (it.kind === 'cure') {
        m.status = null;
        AUD.jingle('itemJ');
        await say(m.name + ' הבריא לגמרי!');
      } else if (it.kind === 'revive') {
        m.hp = Math.floor(m.maxhp / 2);
        AUD.jingle('itemJ');
        await say(m.name + ' התייצב לשירות מילואים!');
      }
    }

    async function onFaint(side) {
      // "חזרה לפוליטיקה" — once-per-battle self revive at 30%
      if (side.revived && side.mon.hp <= 0) {
        side.revived = false;
        await ENG.wait(20);
        await say(side.mon.name + '... רגע! הוא חוזר לפוליטיקה!!');
        AUD.jingle('itemJ');
        fxSummon(side);
        side.visible = true;
        await animHP(side, Math.max(1, Math.floor(side.mon.maxhp * 0.3)));
        return;
      }
      AUD.cry(side.mon.species);
      await faintAnim(side);
      await say(side.mon.name + ' הודח מהקרב!');
      if (!side.isPlayer) {
        await giveExp();
        if (enemyIdx + 1 < enemyParty.length) {
          await sendEnemy(enemyIdx + 1);
          return;
        }
        // victory
        if (st.trainer) {
          AUD.music('victory');
          await say(G.name + ' ניצח את ' + st.trainer.cls + ' ' + st.trainer.name + '!');
          await say(st.trainer.name + ': ' + st.trainer.lose);
          G.money += st.trainer.money;
          await say(G.name + ' קיבל ' + UI.fmtMoney(st.trainer.money) + ' מימון קואליציוני!');
        } else {
          AUD.music('victory');
          await ENG.wait(20);
        }
        return finish('win');
      }
      // player mon fainted
      SCN.checkAchievements && SCN.checkAchievements('faint');
      if (G.party.some(m => m.hp > 0)) {
        const idx = await SCN.partySelect({ battle: true, forced: true });
        if (idx == null) return finish('lose');
        await sendPlayer(idx);
      } else {
        return finish('lose');
      }
    }

    async function finish(outcome) {
      st.over = true;
      await ENG.wait(30);
      await ENG.fadeOut(14);
      ENG.pop();
      resolveResult({ outcome, evolveQueue: st.evolveQueue });
    }

    /* ---------- player action menus ---------- */
    function chooseAction() {
      return new Promise(r => { st.mode = 'action'; st.mi = 0; st.choice = r; });
    }

    async function openBag() {
      const res = await SCN.bagSelect({ battle: true });
      if (!res) { st.mode = 'action'; return; }
      if (DATA.ITEMS[res.item].kind === 'ball') { st.choice({ type: 'item', item: res.item }); st.mode = null; return; }
      st.choice({ type: 'item', item: res.item, target: res.target });
      st.mode = null;
    }
    async function openParty() {
      const idx = await SCN.partySelect({ battle: true, currentIdx: st.playerIdx });
      if (idx == null || idx === st.playerIdx) { st.mode = 'action'; return; }
      st.choice({ type: 'switch', idx });
      st.mode = null;
    }

    /* ---------- scene object ---------- */
    const sceneObj = {
      opaque: true,
      update() {
        updateFx();
        if (st.mode === 'action') {
          if (ENG.btnr('LEFT') || ENG.btnr('RIGHT')) { st.mi ^= 1; AUD.sfx('sel'); }
          if (ENG.btnr('UP') || ENG.btnr('DOWN')) { st.mi ^= 2; AUD.sfx('sel'); }
          if (ENG.btnp('A')) {
            AUD.sfx('ok');
            if (st.mi === 0) { st.mode = 'moves'; st.mvi = 0; }
            else if (st.mi === 1) { st.mode = null; openBag(); }
            else if (st.mi === 2) { st.mode = null; openParty(); }
            else { st.mode = null; st.choice({ type: 'run' }); }
          }
        } else if (st.mode === 'moves') {
          const n = P.mon.moves.length;
          if (ENG.btnr('LEFT') || ENG.btnr('RIGHT')) { st.mvi = (st.mvi ^ 1) % 4; if (st.mvi >= n) st.mvi = 0; AUD.sfx('sel'); }
          if (ENG.btnr('UP') || ENG.btnr('DOWN')) { st.mvi = (st.mvi ^ 2) % 4; if (st.mvi >= n) st.mvi = st.mvi % 2; AUD.sfx('sel'); }
          if (ENG.btnp('B')) { st.mode = 'action'; AUD.sfx('cancel'); }
          else if (ENG.btnp('A')) {
            const mv = P.mon.moves[st.mvi];
            if (P.mon.moves.every(x => x.pp <= 0)) {
              st.mode = null; st.choice({ type: 'move', move: { id: 'STRUGGLE', pp: 1, maxpp: 1 } });
            } else if (mv.pp <= 0) {
              AUD.sfx('buzz');
            } else {
              AUD.sfx('ok');
              st.mode = null; st.choice({ type: 'move', move: mv });
            }
          }
        }
      },

      draw(ctx) {
        ctx.save();
        if (st.fx.shake > 0) ctx.translate(Math.round(Math.random() * st.fx.shake - st.fx.shake / 2), Math.round(Math.random() * st.fx.shake - st.fx.shake / 2));
        drawField(ctx);
        // enemy (health-state expression + near-faint flicker)
        if (E.mon && E.visible && E.scale > 0) {
          const s = 48 * E.scale;
          const bob = Math.sin(G.frame / 22) * 1.2;
          const spr = monSprite(E, P);
          if (!(spr.flicker && (G.frame >> 2) % 3 === 0))
            ctx.drawImage(spr.img, 184 - s / 2 + E.offX, 72 - s + E.offY + bob, s, s);
          if (E.prot > 0 || E.shieldHP > 0) drawShield(ctx, 184 + E.offX, 52, 26);
        }
        if (st.ball) drawBall(ctx);
        // trainer sliding in
        if (st.trainerVis) {
          const spr = SPR.CHR[st.trainer.sprite] || SPR.CHR.kid;
          ctx.drawImage(spr.down[0], 160 + st.trainerVis.offX, 18, 48, 60);
        }
        // player mon (back view, big)
        if (P.mon && P.visible) {
          ctx.save();
          ctx.beginPath(); ctx.rect(0, 0, G.W, 114); ctx.clip();
          const spr = monSprite(P, E);
          const img = P.scale >= 1 ? backSprite(P.mon.species) : spr.img;
          if (!(spr.flicker && (G.frame >> 2) % 3 === 0))
            ctx.drawImage(img, 56 - 36 + P.offX, 112 - 68 + P.offY + Math.sin(G.frame / 26) * 0.8, 72, 72);
          if (P.prot > 0 || P.shieldHP > 0) drawShield(ctx, 56 + P.offX, 84, 34);
          ctx.restore();
        }
        drawFx(ctx);
        ctx.restore();
        // info boxes
        if (E.mon) drawEnemyBox(ctx);
        if (P.mon) drawPlayerBox(ctx);
        // bottom panel
        UI.panel(ctx, 2, 114, 236, 44, { border: '#6878b8' });
        if (st.mode === 'action') {
          FONT.right(ctx, 'מה יעשה', 110, 122, UI.COL.text, { shadow: UI.COL.shadow });
          FONT.right(ctx, P.mon.name + '?', 110, 136, UI.COL.text, { shadow: UI.COL.shadow });
          UI.panel(ctx, 124, 114, 114, 44);
          const opts = ['קרב', 'תיק', 'צוות', 'ברח'];
          for (let i = 0; i < 4; i++) {
            const ox = 182 - (i % 2) * 52, oy = 122 + (i >> 1) * 16; // RTL: first option on the right
            FONT.right(ctx, opts[i], ox + 40, oy, UI.COL.text, { shadow: UI.COL.shadow });
            if (st.mi === i) UI.text(ctx, '<', ox + 44, oy, '#d83028', { noShadow: true, raw: true });
          }
        } else if (st.mode === 'moves') {
          for (let i = 0; i < 4; i++) {
            const mv = P.mon.moves[i];
            const ox = 96 - (i % 2) * 82, oy = 122 + (i >> 1) * 16; // RTL columns
            if (mv) FONT.right(ctx, DATA.MOVES[mv.id].name.slice(0, 13), ox + 60, oy, mv.pp <= 0 ? '#b04040' : UI.COL.text, { shadow: UI.COL.shadow });
            if (st.mvi === i) UI.text(ctx, '<', ox + 64, oy, '#d83028', { noShadow: true, raw: true });
          }
          UI.panel(ctx, 178, 114, 60, 44);
          const mv = P.mon.moves[st.mvi];
          if (mv) {
            UI.text(ctx, 'PP', 186, 121, '#787880');
            UI.text(ctx, mv.pp + '/' + mv.maxpp, 204, 121);
            UI.typeBadge(ctx, DATA.MOVES[mv.id].type, 188, 138);
          }
        }
      },
    };
    function drawShield(ctx, cx, cy, r) {
      ctx.save();
      ctx.globalAlpha = 0.35 + Math.sin(G.frame / 8) * 0.12;
      ctx.strokeStyle = '#78c8f8'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, 7); ctx.stroke();
      ctx.globalAlpha = 0.12;
      ctx.fillStyle = '#a8e0f8';
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, 7); ctx.fill();
      ctx.restore();
    }

    function drawField(ctx) {
      const cave = st.env === 'cave', f = G.frame;
      if (cave) {
        const sky = ctx.createLinearGradient(0, 0, 0, 114);
        sky.addColorStop(0, '#221a30'); sky.addColorStop(0.6, '#3a3044'); sky.addColorStop(1, '#544850');
        ctx.fillStyle = sky; ctx.fillRect(0, 0, G.W, 114);
        // stalactites
        ctx.fillStyle = '#191322';
        for (let i = 0; i < 9; i++) {
          const sx = i * 29 + (i % 3) * 7, h = 14 + ((i * 37) % 19);
          ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx + 16, 0); ctx.lineTo(sx + 8, h); ctx.closePath(); ctx.fill();
        }
        ctx.fillStyle = 'rgba(120,100,140,.5)';
        for (let i = 0; i < 9; i++) { const sx = i * 29 + (i % 3) * 7; ctx.fillRect(sx + 7, 2, 1.5, 6 + ((i * 37) % 19) / 2); }
        // twinkling crystals
        for (let i = 0; i < 7; i++) {
          const cx = (i * 67 + 23) % 230, cy = 26 + (i * 41) % 68;
          const tw = 0.35 + 0.3 * Math.sin(f / 14 + i * 2.2);
          ctx.fillStyle = `rgba(150,220,255,${tw})`;
          ctx.fillRect(cx, cy, 2, 2); ctx.fillRect(cx + 0.5, cy - 1, 1, 4); ctx.fillRect(cx - 1, cy + 0.5, 4, 1);
        }
        // drifting mist
        ctx.fillStyle = 'rgba(160,140,180,.08)';
        for (let i = 0; i < 3; i++) {
          const mx = ((f * (0.2 + i * 0.08) + i * 130) % 340) - 60;
          ctx.beginPath(); ctx.ellipse(mx, 78 + i * 12, 52, 8, 0, 0, 7); ctx.fill();
        }
        // rocky floor
        const fl = ctx.createLinearGradient(0, 66, 0, 114);
        fl.addColorStop(0, '#4e4046'); fl.addColorStop(1, '#635254');
        ctx.fillStyle = fl; ctx.fillRect(0, 66, G.W, 48);
        ctx.fillStyle = 'rgba(30,22,30,.4)'; ctx.fillRect(0, 66, G.W, 1.5);
      } else {
        // sky with sun haze
        const sky = ctx.createLinearGradient(0, 0, 0, 72);
        sky.addColorStop(0, '#7ec8f2'); sky.addColorStop(0.7, '#bfe6fa'); sky.addColorStop(1, '#eaf6da');
        ctx.fillStyle = sky; ctx.fillRect(0, 0, G.W, 72);
        const sun = ctx.createRadialGradient(206, 12, 3, 206, 12, 42 + Math.sin(f / 40) * 2);
        sun.addColorStop(0, 'rgba(255,250,215,.95)'); sun.addColorStop(0.25, 'rgba(255,244,190,.45)'); sun.addColorStop(1, 'rgba(255,244,190,0)');
        ctx.fillStyle = sun; ctx.fillRect(140, 0, 100, 70);
        // slow clouds
        ctx.fillStyle = 'rgba(255,255,255,.75)';
        for (let i = 0; i < 3; i++) {
          const cxx = ((f * (0.06 + i * 0.03) + i * 110) % 300) - 40, cyy = 12 + i * 13;
          ctx.beginPath();
          ctx.ellipse(cxx, cyy, 20, 5, 0, 0, 7); ctx.ellipse(cxx + 13, cyy + 2, 13, 4, 0, 0, 7);
          ctx.ellipse(cxx - 12, cyy + 2.5, 11, 3.5, 0, 0, 7); ctx.fill();
        }
        // distant treeline (two parallax bands)
        const drift = Math.sin(f / 160) * 2;
        ctx.fillStyle = '#5e9a55';
        for (let i = -1; i < 14; i++) { const tx = i * 20 + drift; ctx.beginPath(); ctx.arc(tx, 68, 11, Math.PI, 0); ctx.fill(); }
        ctx.fillRect(0, 66, G.W, 7);
        ctx.fillStyle = '#71b264';
        for (let i = -1; i < 12; i++) { const tx = i * 24 + 9 + drift * 1.6; ctx.beginPath(); ctx.arc(tx, 73, 9, Math.PI, 0); ctx.fill(); }
        ctx.fillRect(0, 71, G.W, 4);
        // meadow
        const fl = ctx.createLinearGradient(0, 74, 0, 114);
        fl.addColorStop(0, '#b2df86'); fl.addColorStop(1, '#8cc45c');
        ctx.fillStyle = fl; ctx.fillRect(0, 74, G.W, 40);
        ctx.fillStyle = 'rgba(255,255,240,.15)';
        ctx.fillRect(0, 79, G.W, 1); ctx.fillRect(0, 93, G.W, 1);
      }
      // platforms (textured, with sprite shadows)
      platform(ctx, 184 + E.offX * 0.3, 75, 40, 11, cave);
      platform(ctx, 56 + P.offX * 0.3, 111, 46, 10, cave);
      shadowEllipse(ctx, 184 + E.offX * 0.3, 74, 17, 4.5);
      shadowEllipse(ctx, 56 + P.offX * 0.3, 109, 26, 5.5);
    }
    function platform(ctx, cx, cy, rx, ry, cave) {
      ctx.fillStyle = cave ? '#453a40' : '#79ad52';                 // rim/under
      ctx.beginPath(); ctx.ellipse(cx, cy + 2, rx, ry, 0, 0, 7); ctx.fill();
      ctx.fillStyle = cave ? '#5e5052' : '#98d070';                 // top
      ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, 7); ctx.fill();
      ctx.fillStyle = cave ? '#6e5e5e' : '#a9dd82';                 // inner light
      ctx.beginPath(); ctx.ellipse(cx - 3, cy - 1.5, rx * 0.66, ry * 0.6, 0, 0, 7); ctx.fill();
      ctx.fillStyle = cave ? 'rgba(40,30,36,.6)' : 'rgba(70,120,50,.55)'; // texture dashes
      for (let i = 0; i < 8; i++) {
        const a = i / 8 * Math.PI * 2 + 0.4;
        ctx.fillRect(cx + Math.cos(a) * rx * 0.62 - 2, cy + Math.sin(a) * ry * 0.62, cave ? 3 : 2.5, 1);
      }
    }
    function shadowEllipse(ctx, cx, cy, rx, ry) {
      ctx.fillStyle = 'rgba(20,30,20,.30)';
      ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, 7); ctx.fill();
    }
    function drawBall(ctx) {
      const b = st.ball;
      let x, y;
      if (b.phase === 'fly') {
        x = 60 + (184 - 60) * b.t;
        y = 80 - Math.sin(Math.PI * b.t) * 55 - 30 * b.t;
      } else { x = 184; y = 64; }
      ctx.save();
      ctx.translate(x, y);
      if (b.wob) ctx.rotate(b.wob * 0.35);
      ctx.drawImage(SPR.T.ballGround, -5, -5);
      ctx.restore();
      if (b.phase === 'caught') {
        ctx.drawImage(SPR.T.sparkle, x - 14, y - 10);
        ctx.drawImage(SPR.T.sparkle, x + 8, y - 6);
      }
    }
    function drawEnemyBox(ctx) {
      UI.panel(ctx, 4, 6, 112, 30);
      FONT.right(ctx, E.mon.name, 108, 11, UI.COL.text, { shadow: UI.COL.shadow });
      UI.text(ctx, 'Lv' + E.mon.level, 10, 11);
      UI.hpBar(ctx, 26, 25, 80, E.dispHP, E.mon.maxhp);
      UI.statusTag(ctx, E.mon.status, 10, 22);
    }
    function drawPlayerBox(ctx) {
      UI.panel(ctx, 124, 72, 112, 40);
      FONT.right(ctx, P.mon.name, 230, 77, UI.COL.text, { shadow: UI.COL.shadow });
      UI.text(ctx, 'Lv' + P.mon.level, 130, 77);
      UI.hpBar(ctx, 146, 91, 80, P.dispHP, P.mon.maxhp);
      UI.text(ctx, Math.ceil(P.dispHP) + '/' + P.mon.maxhp, 164, 97);
      UI.expBar(ctx, 146, 107, 80, P.mon);
      UI.statusTag(ctx, P.mon.status, 130, 88);
    }

    main();
    sceneObj.st = st;
    sceneObj.sides = () => ({ P, E });
    return sceneObj;
  }

  return { scene };
})();

</script>
  <script>
/* ============================================================
   SCENES — פוקימון כנסת: title, intro, pause menu, party,
   summary, bag, כנסדקס, shop, options, evolution, credits,
   coalition share, achievements, gallery.
   ============================================================ */
const SCN = (() => {

  const SHARE_URL = 'https://nivsheena.github.io/knessetmon/';

  /* ---------------- achievements ---------------- */
  const ACH = {
    impossible: { name: 'קואליציה בלתי אפשרית', desc: 'ביבימון, מיצנמון ובן-גבירון בצוות אחד' },
    all_traitors: { name: 'כולם בוגדים', desc: 'כל הקואליציה שלך קרסה בקרב אחד' },
    fifth_elections: { name: 'בחירות חמישיות', desc: 'הפסדת 5 פעמים לאותו יריב' },
    yesh_memshala: { name: 'יש ממשלה!', desc: 'ניצחת את הכנסת וקיבלת תעודת ח״כ' },
    home: { name: 'הביתה', desc: 'הבאת את חטופמון הביתה' },
  };
  async function award(id) {
    if (G.flags['ach_' + id]) return;
    G.flags['ach_' + id] = true;
    AUD.jingle('badge');
    await UI.say('הישג חדש: "' + ACH[id].name + '"!');
  }
  function checkAchievements(ev) {
    (async () => {
      if (ev === 'catch') {
        const have = s => G.party.some(m => m.species === s);
        if (have('BIBIMON') && have('MITZNAMON') && have('BENGVIRON')) await award('impossible');
        if (G.flags.chatuf_home) await award('home');
      }
      if (ev === 'faint' && G.party.length >= 2 && G.party.every(m => m.hp <= 0)) await award('all_traitors');
      if (ev === 'badge') await award('yesh_memshala');
      if (ev === 'lose5') await award('fifth_elections');
    })();
  }

  /* ---------------- shared: level-up outside battle ---------------- */
  async function learnMoveFlow(m, moveId) {
    if (m.moves.some(x => x.id === moveId)) return;
    const mv = DATA.MOVES[moveId];
    if (m.moves.length < 4) {
      m.moves.push({ id: moveId, pp: mv.pp, maxpp: mv.pp });
      AUD.jingle('itemJ');
      await UI.say(m.name + ' למד את "' + mv.name + '"!');
      return;
    }
    const yes = await UI.ask(m.name + ' רוצה ללמוד את "' + mv.name + '". לשכוח מהלך ישן?', ['כן', 'לא']);
    if (yes === 0) {
      const pickIdx = await UI.menu(m.moves.map(x => DATA.MOVES[x.id].name), { x: 92, y: 40 });
      if (pickIdx >= 0) {
        const old = DATA.MOVES[m.moves[pickIdx].id].name;
        m.moves[pickIdx] = { id: moveId, pp: mv.pp, maxpp: mv.pp };
        await UI.say(m.name + ' שכח את "' + old + '" ולמד את "' + mv.name + '"!');
        return;
      }
    }
    await UI.say(m.name + ' ויתר על "' + mv.name + '".');
  }
  async function levelUpMon(m) {
    m.level++;
    m.exp = Math.max(m.exp, DATA.expForLevel(m.level));
    const oldMax = m.maxhp;
    DATA.calcStats(m);
    m.hp = Math.min(m.maxhp, m.hp + (m.maxhp - oldMax));
    AUD.jingle('levelup');
    await UI.say(m.name + ' עלה לרמה ' + m.level + '!');
    for (const learn of DATA.movesLearnedAtLevel(m.species, m.level)) await learnMoveFlow(m, learn);
    const evo = DATA.SPECIES[m.species].evo;
    if (evo && m.level >= evo.at) {
      await new Promise(res => ENG.push(EvolveScene(m, evo.to, res)));
      if (OW.map) AUD.music(OW.map.music);
    }
  }

  /* ---------------- title ---------------- */
  function TitleScene() {
    let busy = false;
    async function proceed() {
      if (busy) return; busy = true;
      AUD.sfx('ok');
      if (ENG.hasSave()) {
        const c = await UI.menu(['המשך', 'משחק חדש'], { x: 66, y: 96, w: 108 });
        if (c === 0) {
          ENG.loadGame();
          const party = DATA.PARTIES.find(p => p.id === G.flags.party);
          if (party) SPR.applyHeroStyle(party);
          await ENG.fadeOut(16);
          OW.loadMap(G.map);
          ENG.replace(OW.scene);
          await ENG.fadeIn(16);
          return;
        }
        if (c === -1) { busy = false; return; }
      }
      await ENG.fadeOut(16);

        for (let i = 0; i < 3; i++) if (((t >> 5) + i) % 3) ctx.fillRect(104 + i * 12, 126, 2, 2); // lit windows
        // sparkle motes
        for (let i = 0; i < 8; i++) {
          const mx = (i * 37 + t * 0.14 + Math.sin(t / 50 + i) * 6) % 240;
          const my = 80 + ((i * 53) % 60) - Math.sin(t / 60 + i * 2) * 5;

        const bnr = ctx.createLinearGradient(0, 61, 0, 77);
        bnr.addColorStop(0, '#2858a8'); bnr.addColorStop(1, '#1a3a78');
        ctx.fillStyle = bnr; UI.rr(ctx, 62, 61, 116, 15, 4); ctx.fill();
        ctx.strokeStyle = 'rgba(248,208,72,.8)'; ctx.lineWidth = 1; UI.rr(ctx, 62.5, 61.5, 115, 14, 4); ctx.stroke();
        FONT.center(ctx, 'גרסת הקואליציה', 120, 65, '#f8e8c8', { noShadow: true });
        // mascots: Bibimon & Ben-Gviron
        const hop = Math.abs(Math.sin(t / 22)) * 4, hop2 = Math.abs(Math.sin(t / 22 + 1.5)) * 4;
        ctx.fillStyle = 'rgba(30,10,20,.35)';
        ctx.beginPath(); ctx.ellipse(56, 131, 17 - hop, 4, 0, 0, 7); ctx.fill();
        ctx.beginPath(); ctx.ellipse(184, 131, 15 - hop2, 4, 0, 0, 7); ctx.fill();
        if (MONART.BIBIMON) ctx.drawImage(MONART.BIBIMON, 32, 84 - hop, 48, 48);
        if (MONART.BENGVIRON) ctx.drawImage(MONART.BENGVIRON, 162, 88 - hop2, 44, 44);

  /* ---------------- party picker (character template) ---------------- */
  function PartyPickScene(res) {
    let idx = 0, preview = null, previewIdx = -1, walkT = 0;
    function buildPreview() {
      if (previewIdx === idx) return;
      previewIdx = idx;
      // reskin the hero sheet with this party's colors + features
      SPR.applyHeroStyle(DATA.PARTIES[idx]);
      preview = SPR.CHR.hero;
    }
    return {
      opaque: true,
      onEnter() { buildPreview(); },
      update() {
        walkT++;
        if (ENG.btnr('RIGHT')) { idx = (idx + 1) % DATA.PARTIES.length; AUD.sfx('sel'); buildPreview(); }
        if (ENG.btnr('LEFT')) { idx = (idx + DATA.PARTIES.length - 1) % DATA.PARTIES.length; AUD.sfx('sel'); buildPreview(); }
        if (ENG.btnr('DOWN')) { idx = (idx + 4) % DATA.PARTIES.length; AUD.sfx('sel'); buildPreview(); }
        if (ENG.btnr('UP')) { idx = (idx + DATA.PARTIES.length - 4) % DATA.PARTIES.length; AUD.sfx('sel'); buildPreview(); }

      draw(ctx) {
        const g = ctx.createLinearGradient(0, 0, 0, 160);
        g.addColorStop(0, '#20386a'); g.addColorStop(1, '#101c3a');

        DATA.PARTIES.forEach((p, i) => {
          const x = 8 + (3 - (i % 4)) * 58, y = 20 + Math.floor(i / 4) * 26; // RTL order
          UI.panel(ctx, x, y, 54, 22, i === idx ? { border: '#e0b040' } : {});
          FONT.center(ctx, p.name, x + 27, y + 7, i === idx ? '#8c2020' : UI.COL.text, { noShadow: true });
        });
        // live preview card
        UI.panel(ctx, 28, 76, 184, 62, { border: '#e0b040' });

        if (preview) {
          const frame = (walkT >> 4) % 2 ? 1 : 0;

      },
    };

  function NameEntryScene(res) {
    const rows = ['אבגדהוזחט', 'יכלמנסעפצ', 'קרשת.-׳״ ', '0123456789'];
    let cx = 0, cy = 0, name = '';
    return {
      opaque: false,
      update() {
        if (ENG.btnr('LEFT')) { cx = (cx + 9) % 10; AUD.sfx('sel'); }
        if (ENG.btnr('RIGHT')) { cx = (cx + 1) % 10; AUD.sfx('sel'); }
        if (ENG.btnr('UP')) { cy = (cy + 4) % 5; AUD.sfx('sel'); }
        if (ENG.btnr('DOWN')) { cy = (cy + 1) % 5; AUD.sfx('sel'); }
        if (ENG.btnp('B')) { name = name.slice(0, -1); AUD.sfx('cancel'); }
        if (ENG.btnp('START')) { ENG.pop(); res(name || 'דני'); }
        if (ENG.btnp('A')) {
          if (cy === 4) { AUD.sfx('ok'); ENG.pop(); res(name || 'דני'); return; }
          const row = rows[cy];
          const ch = row[Math.min(cx, row.length - 1)];
          if (ch && ch !== ' ' && name.length < 7) { name += ch; AUD.sfx('sel'); } else AUD.sfx('buzz');
        }
      },
      draw(ctx) {
        UI.panel(ctx, 20, 12, 200, 136);
        FONT.right(ctx, 'השם שלך?', 208, 20, UI.COL.text, { shadow: UI.COL.shadow });
        UI.text(ctx, name.padEnd(7, '_'), 30, 20, '#b02030');
        for (let y = 0; y < 4; y++) for (let x = 0; x < 10; x++) {
          const row = rows[y], ch = row[x];
          if (ch && ch !== ' ') UI.text(ctx, ch, 34 + x * 18, 40 + y * 18, undefined, { raw: true });
        }
        UI.text(ctx, 'סיום', 34, 40 + 4 * 18, '#3060c8');
        const selX = cy === 4 ? 34 : 34 + cx * 18, selY = 40 + cy * 18;
        UI.text(ctx, '>', selX - 9, selY, '#d83028', { noShadow: true, raw: true });
        FONT.right(ctx, 'A: בחר  B: מחק  ENTER: סיום', 208, 136, '#787880', { noShadow: true });
      },
    };
  }

  /* ---------------- pause menu ---------------- */
  function PauseMenu() {
    const items = () => {
      const list = [];
      list.push({ id: 'dex', label: 'כנסדקס' });
      if (G.party.length) list.push({ id: 'party', label: 'קואליציה' });
      list.push({ id: 'bag', label: 'תיק' });
      list.push({ id: 'coal', label: 'שיתוף' });
      list.push({ id: 'card', label: G.name });
      list.push({ id: 'save', label: 'שמירה' });
      list.push({ id: 'opt', label: 'הגדרות' });
      list.push({ id: 'exit', label: 'יציאה' });
      return list;
    };
    let idx = 0, busy = false;
    return {
      update() {
        if (busy) return;
        const list = items();
        if (ENG.btnr('UP')) { idx = (idx + list.length - 1) % list.length; AUD.sfx('sel'); }
        if (ENG.btnr('DOWN')) { idx = (idx + 1) % list.length; AUD.sfx('sel'); }
        if (ENG.btnp('B') || ENG.btnp('START')) { AUD.sfx('cancel'); ENG.pop(); return; }
        if (ENG.btnp('A')) {
          const id = list[idx].id;
          AUD.sfx('ok');
          busy = true;
          (async () => {
            if (id === 'dex') await new Promise(r => ENG.push(DexScene(r)));
            else if (id === 'party') await partyMenu();
            else if (id === 'bag') await bagOverworld();
            else if (id === 'coal') await new Promise(r => ENG.push(CoalitionScene(r)));
            else if (id === 'card') await new Promise(r => ENG.push(CardScene(r)));
            else if (id === 'save') {
              const yes = await UI.ask('לשמור את ההתקדמות?', ['כן', 'לא']);
              if (yes === 0) { ENG.saveGame(); AUD.sfx('save'); await UI.say(G.name + ' שמר את המשחק!'); }
            }
            else if (id === 'opt') await new Promise(r => ENG.push(OptionsScene(r)));
            else if (id === 'exit') { ENG.pop(); return; }
            busy = false;
          })();
        }
      },
      draw(ctx) {
        const list = items();
        const w = 88, h = list.length * 14 + 12;
        UI.panel(ctx, G.W - w - 3, 3, w, h);
        list.forEach((it, i) => {
          FONT.right(ctx, it.label, G.W - 18, 10 + i * 14, it.id === 'card' ? '#3060c8' : UI.COL.text, { shadow: UI.COL.shadow });
          if (i === idx) UI.text(ctx, '<', G.W - 13, 10 + i * 14, '#d83028', { noShadow: true, raw: true });
        });
      },
    };
  }

  function shareText() {

      '\nהאם הממשלה הזו תחזיק? 🗳️' +
      '\n🎮 המשחק של ניב שינה:\n' + SHARE_URL;
  }
  function CoalitionScene(res) {
    let flash = 0, copied = false;
    async function share() {
      const txt = shareText();
      let ok = false;
      try { await navigator.clipboard.writeText(txt); ok = true; } catch (e) {
        try {
          const ta = document.createElement('textarea');
          ta.value = txt; document.body.appendChild(ta); ta.select();
          ok = document.execCommand('copy'); document.body.removeChild(ta);
        } catch (e2) { ok = false; }
      }
      try { window.open('https://wa.me/?text=' + encodeURIComponent(txt), '_blank'); } catch (e) {}
      copied = ok;
      flash = 40;
      AUD.jingle('itemJ');
    }
    return {
      opaque: true,
      onEnter() { AUD.music('victory'); },
      update() {
        if (flash > 0) flash--;
        if (ENG.btnp('A')) share();
        if (ENG.btnp('B') || ENG.btnp('START')) { AUD.sfx('cancel'); ENG.pop(); if (OW.map) AUD.music(OW.map.music); res(); }

      draw(ctx) {

  /* ---------------- party ---------------- */
  function PartyListScene(opts, res) {
    let idx = 0, busy = false;
    const cancelable = !opts.forced;
    return {
      opaque: true,
      update() {
        if (busy) return;
        const n = G.party.length;
        if (ENG.btnr('UP')) { idx = (idx + n - 1) % n; AUD.sfx('sel'); }
        if (ENG.btnr('DOWN')) { idx = (idx + 1) % n; AUD.sfx('sel'); }
        if (ENG.btnp('B') && cancelable) { AUD.sfx('cancel'); ENG.pop(); res(null); return; }
        if (ENG.btnp('A')) {
          const m = G.party[idx];
          if (opts.select) {
            if (opts.needAlive && m.hp <= 0) { AUD.sfx('buzz'); return; }
            if (opts.currentIdx === idx) { AUD.sfx('buzz'); return; }
            AUD.sfx('ok'); ENG.pop(); res(idx); return;
          }
          busy = true;

  /* ---------------- bag ---------------- */
  function BagListScene(opts, res) {
    const entries = () => Object.keys(G.bag).filter(k => G.bag[k] > 0);
    let idx = 0, busy = false;
    return {
      opaque: true,
      update() {
        if (busy) return;
        const list = entries();
        if (!list.length) {
          if (ENG.btnp('A') || ENG.btnp('B')) { AUD.sfx('cancel'); ENG.pop(); res(null); }
          return;
        }
        if (idx >= list.length) idx = list.length - 1;
        if (ENG.btnr('UP')) { idx = (idx + list.length - 1) % list.length; AUD.sfx('sel'); }
        if (ENG.btnr('DOWN')) { idx = (idx + 1) % list.length; AUD.sfx('sel'); }
        if (ENG.btnp('B')) { AUD.sfx('cancel'); ENG.pop(); res(null); return; }
        if (ENG.btnp('A')) {
          const item = list[idx];
          const def = DATA.ITEMS[item];
          busy = true;
          (async () => {
            AUD.sfx('ok');
            if (opts.battle) {
              if (def.kind === 'ball') { ENG.pop(); res({ item }); return; }
              if (def.kind === 'candy' || def.kind === 'key') { await UI.say('יש זמן ומקום לכל דבר. לא עכשיו!'); busy = false; return; }
              const t = await partySelect({});
              if (t == null) { busy = false; return; }
              if (def.kind === 'revive' && G.party[t].hp > 0) { await UI.say('אין לזה השפעה.'); busy = false; return; }
              if (def.kind !== 'revive' && G.party[t].hp <= 0) { await UI.say('אין לזה השפעה.'); busy = false; return; }
              ENG.pop(); res({ item, target: t }); return;
            }
            // overworld use
            if (def.kind === 'ball') { await UI.say('קלפי זורקים רק על פוליטיקאי פראי. בקרב!'); busy = false; return; }
            if (def.kind === 'key') {
              G.riding = !G.riding;
              AUD.sfx(G.riding ? 'ok' : 'cancel');
              await UI.say(G.riding ? G.name + ' עלה על הקורקינט! (מהירות טורבו)' : G.name + ' ירד מהקורקינט.');
              busy = false; return;
            }
            const t = await partySelect({});
            if (t == null) { busy = false; return; }
            const m = G.party[t];
            if (def.kind === 'heal') {
              if (m.hp <= 0 || m.hp >= m.maxhp) { await UI.say('אין לזה השפעה.'); busy = false; return; }
              const heal = Math.min(def.val, m.maxhp - m.hp);
              m.hp += heal;
              G.bag[item]--; if (G.bag[item] <= 0) delete G.bag[item];
              AUD.jingle('itemJ');
              await UI.say(m.name + ' התאושש ב-' + heal + ' נקודות חוסן!');
            } else if (def.kind === 'cure') {
              if (m.status !== def.val) { await UI.say('אין לזה השפעה.'); busy = false; return; }
              m.status = null;
              G.bag[item]--; if (G.bag[item] <= 0) delete G.bag[item];
              AUD.jingle('itemJ');
              await UI.say(m.name + ' הבריא!');
            } else if (def.kind === 'revive') {
              if (m.hp > 0) { await UI.say('אין לזה השפעה.'); busy = false; return; }
              m.hp = Math.floor(m.maxhp / 2);
              G.bag[item]--; if (G.bag[item] <= 0) delete G.bag[item];
              AUD.jingle('itemJ');
              await UI.say(m.name + ' התייצב למילואים!');
            } else if (def.kind === 'candy') {
              if (m.level >= DATA.MAXLEVEL) { await UI.say('אין לזה השפעה.'); busy = false; return; }
              G.bag[item]--; if (G.bag[item] <= 0) delete G.bag[item];
              await levelUpMon(m);
            }
            busy = false;
          })();
        }

          if (ENG.btnr('UP')) { idx = (idx + STOCK.length - 1) % STOCK.length; AUD.sfx('sel'); }

          if (ENG.btnp('A')) { AUD.sfx('ok'); qty = 1; mode = 'qty'; return; }

  /* ---------------- evolution ---------------- */
  function EvolveScene(mon, to, res) {
    let t = 0, cancelled = false, finished = false, started = false;
    const oldSp = mon.species;
    const white = { old: SPR.tint(MONART[oldSp], '#f8f8ff'), nw: SPR.tint(MONART[to], '#f8f8ff') };
    async function run() {
      AUD.music('evolve');
      await UI.say('רגע... ' + mon.name + ' מתקדם בפריימריז!');
      const t0 = G.frame;
      while (G.frame - t0 < 260 && !cancelled) await ENG.wait(1);
      if (cancelled) {
        AUD.sfx('cancel');
        AUD.stopMusic();
        await UI.say('אה? ' + mon.name + ' עצר את הקידום! (יש ועדת חקירה)');
        ENG.pop(); res(); return;
      }
      finished = true;
      const oldName = mon.name;
      const defaultName = DATA.SPECIES[oldSp].name;
      mon.species = to;
      if (mon.name === defaultName) mon.name = DATA.SPECIES[to].name;
      const oldMax = mon.maxhp;
      DATA.calcStats(mon);
      mon.hp = Math.min(mon.maxhp, mon.hp + (mon.maxhp - oldMax));
      G.dex.seen[to] = true; G.dex.caught[to] = true;
      AUD.cry(to);
      AUD.jingle('badge');
      await UI.say('מזל טוב! ' + oldName + ' התקדם והפך ל' + DATA.SPECIES[to].name + '!');
      for (const learn of DATA.movesLearnedAtLevel(to, mon.level)) await learnMoveFlow(mon, learn);
      ENG.pop(); res();
    }
    return {
      opaque: true,
      update() {
        if (!started) { started = true; run(); }
        t++;
        if (!finished && ENG.btnp('B')) cancelled = true;
      },
      draw(ctx) {
        const g = ctx.createRadialGradient(120, 70, 10, 120, 70, 150);
        g.addColorStop(0, '#f8f8ff'); g.addColorStop(1, '#6890d8');
        ctx.fillStyle = g; ctx.fillRect(0, 0, G.W, G.H);
        let img;
        if (finished) img = MONART[mon.species];
        else if (t < 80) img = MONART[oldSp];
        else {
          const speed = Math.max(4, 20 - Math.floor((t - 80) / 30) * 4);
          img = (Math.floor(t / speed) % 2 === 0) ? white.old : white.nw;
        }
        ctx.drawImage(img, 84, 34, 72, 72);
        if (!finished && t >= 80) {
          for (let i = 0; i < 5; i++) {
            const a = t / 8 + i * 1.26;
            ctx.drawImage(SPR.T.sparkle, 120 + Math.cos(a) * 50 - 3, 70 + Math.sin(a) * 34 - 3);
          }
        }
      },
    };
  }

      ['ייעוץ משפטי', 1], ['פרופסור בג״ץ', 0], ['', 0],
      ['ועדת הבדיקה', 1], [() => G.name + ' וניב שינה', 0], ['', 0],
      ['תודה מיוחדת', 1], ['לכל מי שהצביע', 0], ['', 0], ['', 0],
      ['ההרפתקה נמשכת...', 2], ['', 0],
      ['במנהרות מסתתר קיר אגדי.', 0], ['במגדל מחכה טייקון זהוב.', 0],
      ['בצפון — משהו קפוא מהקרמלין.', 0], ['', 0],
      ['תודה ששיחקת!', 2],
      ['משחק מאת ניב שינה', 0], ['עכשיו לך תצביע.', 0],
    ];
    let scroll = -140, done = false;
    const parade = ['BIBIMON', 'LAPIDON', 'BENGVIRON', 'GANTZON', 'DERIDERI', 'SMOTRICHMON', 'MITZNAMON', 'GALANTMON'];
    return {
      opaque: true,
      onEnter() { AUD.music('credits'); ENG.fadeIn(24); },
      update() {
        scroll += ENG.btn('B') ? 1.6 : 0.4;
        const totalH = lines.length * 16 + 40;
        if (scroll > totalH && !done) { done = true; }
        if (done && (ENG.btnp('A') || ENG.btnp('START'))) {
          AUD.sfx('ok'); ENG.pop(); res();
        }
      },
      draw(ctx) {
        ctx.fillStyle = '#080814'; ctx.fillRect(0, 0, G.W, G.H);
        for (let i = 0; i < 40; i++) {
          const sx = (i * 61 + 13) % 240, sy = (i * 37 + 11) % 160;
          ctx.fillStyle = 'rgba(200,210,255,' + (0.2 + (i % 4) * 0.15) + ')';
          ctx.fillRect(sx, sy, 1, 1);
        }
        lines.forEach(([txt, style], i) => {
          const y = 20 + i * 16 - scroll;
          if (y < -20 || y > 170) return;
          const s = typeof txt === 'function' ? txt() : txt;
          if (style === 2) FONT.center(ctx, s, 120, y, '#f8d048', { scale: 1, shadow: '#403010' });
          else if (style === 1) FONT.center(ctx, s, 120, y, '#8890b8', { noShadow: true });
          else FONT.center(ctx, s, 120, y, '#f0f0f8', { shadow: '#282838' });
        });
        // politician parade along the bottom
        parade.forEach((sp, i) => {
          if (!MONART[sp]) return;
          const x = (G.frame / 2 + i * 70) % (240 + 60) - 40;
          const bob = Math.abs(Math.sin(G.frame / 14 + i)) * 3;
          ctx.drawImage(MONART[sp], 240 - x, 132 - bob, 24, 24);
        });
        if (done && ((G.frame >> 5) & 1)) FONT.center(ctx, 'לחץ ENTER', 120, 100, '#f8f8f0');
      },
    };
  }

  /* ---------------- debug gallery ---------------- */
  function GalleryScene() {
    let page = 0;
    const pages = Math.ceil(DATA.DEX_ORDER.length / 9);
    return {
      opaque: true,
      update() {
        if (ENG.btnp('LEFT')) { page = (page + pages - 1) % pages; }
        if (ENG.btnp('RIGHT') || ENG.btnp('A')) { page = (page + 1) % pages; }
      },
      draw(ctx) {
        ctx.fillStyle = '#20242c'; ctx.fillRect(0, 0, G.W, G.H);
        FONT.draw(ctx, 'GALLERY p' + (page + 1) + '/' + pages + ' (arrows)', 4, 2, '#8890a0');
        const keys = DATA.DEX_ORDER.slice(page * 9, page * 9 + 9);
        keys.forEach((k, i) => {
          const x = 10 + (i % 5) * 46, y = 14 + Math.floor(i / 5) * 70;
          ctx.fillStyle = '#303844'; ctx.fillRect(x - 2, y - 2, 40, 40);
          if (MONART[k]) ctx.drawImage(MONART[k], x, y, 36, 36);
          FONT.center(ctx, DATA.SPECIES[k].name.slice(0, 8), x + 17, y + 40, '#c8d0e0', { noShadow: true });
        });
      },
    };
  }

  /* ---------------- cinematic trailer / attract mode ---------------- */
  function TrailerScene() {
    let start = -1, shotIdx = -1;

    // ---- shared draw helpers ----
    function bg(ctx, top, bot) {
      const g = ctx.createLinearGradient(0, 0, 0, G.H);
      g.addColorStop(0, top); g.addColorStop(1, bot);
      ctx.fillStyle = g; ctx.fillRect(0, 0, G.W, G.H);
    }
    function mon(ctx, id, cx, cy, size, f, sway) {
      const bob = Math.sin(f / 9 + cx) * (size * 0.05);
      ctx.fillStyle = 'rgba(0,0,0,.28)';
      ctx.beginPath(); ctx.ellipse(cx, cy + size / 2 - 1, size * 0.36, size * 0.11, 0, 0, 7); ctx.fill();
      if (MONART[id]) {
        ctx.save();
        if (sway) { ctx.translate(cx, cy); ctx.rotate(Math.sin(f / 14) * 0.05); ctx.translate(-cx, -cy); }
        ctx.drawImage(MONART[id], cx - size / 2, cy - size / 2 + bob, size, size);
        ctx.restore();
      }
    }
    function sparkles(ctx, f, n, col) {
      for (let i = 0; i < n; i++) {
        const a = 0.3 + 0.5 * Math.abs(Math.sin(f / 7 + i * 1.9));
        const x = (i * 61 + (f * (0.4 + (i % 3) * 0.2))) % (G.W + 20) - 10;
        const y = (i * 43 + 13) % G.H + Math.sin(f / 20 + i) * 4;
        ctx.fillStyle = col.replace('A', a.toFixed(2));
        ctx.fillRect(x, y, 2, 2);
      }
    }
    // Hebrew title card: lines rise + fade, gold accent on first line
    function card(ctx, p, big, small, col) {
      const rise = (1 - Math.min(1, p * 3)) * 8;
      col = col || '#f8d048';
      FONT.center(ctx, big, 120, 58 - rise, '#2a1626', { scale: 2.4, noShadow: true });
      FONT.center(ctx, big, 118.5, 56.5 - rise, col, { scale: 2.4, shadow: '#1a0e18' });
      if (small) FONT.center(ctx, small, 120, 90 + rise, '#f0e8d8', { shadow: '#2a1626' });
    }

    // ---- the shot list (durations in frames @60fps) ----
    const SHOTS = [
      { dur: 130, music: 'title', draw(p, ctx, f) { // cold open
        bg(ctx, '#0a0b18', '#181833');
        sparkles(ctx, f, 26, 'rgba(200,210,255,A)');
        FONT.center(ctx, 'בעולם שכולו בחירות...', 120, 66, '#c8d0f0', { shadow: '#0a0b18' });
        FONT.center(ctx, 'רק אלוף אחד ישרוד.', 120, 86, '#8890c0', { noShadow: true });
      } },
      { dur: 130, draw(p, ctx, f) { // logo slam
        bg(ctx, '#12203e', '#5c2c50');
        const glow = ctx.createRadialGradient(120, 70, 4, 120, 70, 70 + Math.sin(f / 8) * 6);
        glow.addColorStop(0, 'rgba(255,224,150,.5)'); glow.addColorStop(1, 'rgba(255,224,150,0)');
        ctx.fillStyle = glow; ctx.fillRect(0, 0, G.W, G.H);
        // shockwave ring on the hit
        if (f < 26) { ctx.strokeStyle = `rgba(248,208,72,${1 - f / 26})`; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(120, 66, f * 5, 0, 7); ctx.stroke(); }
        const pop = f < 10 ? 1 + (10 - f) * 0.08 : 1;
        FONT.center(ctx, 'כנסתמון', 121.5, 50, '#2a1020', { scale: 3.6 * pop, noShadow: true });
        FONT.center(ctx, 'כנסתמון', 120, 48, '#f8d048', { scale: 3.6 * pop, shadow: '#301828' });
        FONT.center(ctx, 'גרסת הקואליציה', 120, 92, '#f0e0c0', { shadow: '#301828' });
      } },
      { dur: 150, draw(p, ctx, f) { // catch 'em all — street monster carousel
        bg(ctx, '#2b2e50', '#171833');
        sparkles(ctx, f, 18, 'rgba(255,220,150,A)');
        const roster = ['FREHAMON', 'ARSMON', 'HNUNMON', 'METALMON', 'GAMERMON', 'TIKTOKMON', 'SAVTAMON'];
        for (let i = 0; i < roster.length; i++) {
          const x = ((f * 1.6) + i * 150) % (G.W + 180) - 90;
          mon(ctx, roster[i], x, 74, 66, f + i * 8, true);
        }
        card(ctx, p, 'תפוס את כולם!', '76 מפלצות ישראליות', '#f8d048');
      } },
      { dur: 130, music: 'battle', draw(p, ctx, f) { // action battle
        bg(ctx, '#7ec8f2', '#bfe6da');
        ctx.fillStyle = '#8cc45c'; ctx.fillRect(0, 96, G.W, 64);
        const shake = f < 60 && f > 40 ? Math.sin(f * 3) * 3 : 0;
        ctx.save(); ctx.translate(shake, 0);
        mon(ctx, 'BENGVIRON', 176, 58, 60, f);
        mon(ctx, 'ATIDMON', 64, 104, 68, f);
        ctx.restore();
        // fire burst on the foe
        if (f > 40 && f < 70) for (let i = 0; i < 14; i++) {
          const a = (f - 40) / 30; ctx.globalAlpha = 1 - a;
          ctx.fillStyle = ['#f8d030', '#f08030', '#e84020'][i % 3];
          ctx.fillRect(176 + Math.cos(i) * a * 40, 58 + Math.sin(i * 2) * a * 30, 3, 3);
          ctx.globalAlpha = 1;
        }
        card(ctx, p, 'קרבות מסעירים', 'אפקט לכל סוג', '#f85030');
      } },
      { dur: 140, draw(p, ctx, f) { // gym leaders
        bg(ctx, '#241c34', '#3c2a4a');
        const leaders = ['MANDATMON', 'GANTZON', 'IRONDOMEMON', 'BENGVIRON'];
        const labels = ['מאי גולן', 'גנץ', 'איזנקוט', 'בן-גביר'];
        for (let i = 0; i < 4; i++) {
          const cx = 33 + i * 58, on = f > 12 + i * 14;
          if (on) { mon(ctx, leaders[i], cx, 60, 50, f + i * 5); FONT.center(ctx, labels[i], cx, 92, '#f0e0c0', { noShadow: true }); }
        }
        FONT.center(ctx, 'נצח את ראשי המכונים', 120, 20, '#f8d048', { shadow: '#241c34' });
      } },
      { dur: 150, music: 'boss', draw(p, ctx, f) { // the world leaders league
        bg(ctx, '#1a0e1e', '#3a1420');
        for (let i = 0; i < 40; i++) { const a = 0.2 + 0.3 * Math.sin(f / 10 + i); ctx.fillStyle = `rgba(200,60,60,${a})`; ctx.fillRect((i * 31 + 7) % 240, (i * 53 + 11) % 160, 1, 1); }
        const world = ['TRUMPMON', 'PUTINMON', 'MACRONMON', 'BIDENMON'];
        for (let i = 0; i < 4; i++) {
          const x = ((f * 1.2) + i * 130) % (G.W + 160) - 80;
          mon(ctx, world[i], x, 72, 62, f + i * 9, true);
        }
        card(ctx, p, 'ליגת בלפור', 'המנהיגים הגדולים בעולם', '#e85040');
      } },
      { dur: 130, draw(p, ctx, f) { // the champion
        bg(ctx, '#12203e', '#20283a');
        // lightning flicker
        if ((f >> 3) % 5 === 0) { ctx.fillStyle = 'rgba(200,220,255,.25)'; ctx.fillRect(0, 0, G.W, G.H); }
        const glow = ctx.createRadialGradient(120, 64, 6, 120, 64, 60);
        glow.addColorStop(0, 'rgba(248,208,72,.4)'); glow.addColorStop(1, 'rgba(248,208,72,0)');
        ctx.fillStyle = glow; ctx.fillRect(0, 0, G.W, G.H);
        mon(ctx, 'BIBIKING', 120, 64, 84, f);
        FONT.center(ctx, 'והאלוף...', 120, 16, '#f0e0c0', { shadow: '#12203e' });
        if (f > 40) FONT.center(ctx, 'אתה כבר יודע מי.', 120, 128, '#f8d048', { shadow: '#12203e' });
      } },
      { dur: 120, music: 'victory', draw(p, ctx, f) { // build your coalition / share
        bg(ctx, '#20386a', '#101c3a');
        ctx.fillStyle = 'rgba(244,239,226,.96)'; UI.rr(ctx, 40, 40, 160, 66, 6); ctx.fill();
        FONT.center(ctx, 'הקואליציה שלך', 120, 46, '#204068', { noShadow: true });
        const team = ['ATIDMON', 'BENGVIRON', 'GANTZON', 'DERIDERI'];
        for (let i = 0; i < 4; i++) if (f > 8 + i * 8 && MONART[team[i]]) ctx.drawImage(MONART[team[i]], 54 + i * 32, 62, 30, 30);
        FONT.center(ctx, 'בנה. שתף. תווכח.', 120, 124, '#f8d048', { shadow: '#101c3a' });
      } },
      { dur: 220, draw(p, ctx, f) { // end card
        bg(ctx, '#0a0b18', '#181833');
        sparkles(ctx, f, 30, 'rgba(255,220,150,A)');
        const bob = Math.sin(f / 30) * 2;
        FONT.center(ctx, 'כנסתמון', 121.5, 30 + bob, '#2a1020', { scale: 3, noShadow: true });
        FONT.center(ctx, 'כנסתמון', 120, 28 + bob, '#f8d048', { scale: 3, shadow: '#301828' });
        if (f > 20) FONT.center(ctx, 'שחקו עכשיו, בחינם:', 120, 74, '#c8d0f0', { shadow: '#0a0b18' });
        if (f > 40) {
          ctx.fillStyle = '#f6d56d'; UI.rr(ctx, 38, 88, 164, 16, 4); ctx.fill();
          FONT.center(ctx, 'nivsheena.github.io/knessetmon', 120, 92, '#2a1c06', { noShadow: true });
        }
        if (f > 70) FONT.center(ctx, 'Made by Niv Sheena', 120, 118, '#a79ede', { noShadow: true });
        if (f > 90 && ((f >> 4) & 1)) FONT.center(ctx, 'לחץ מקש כדי להתחיל', 120, 140, '#f8f8f0', { noShadow: true });
      } },
    ];
    const total = SHOTS.reduce((a, s) => a + s.dur, 0);

    return {
      opaque: true,
      onEnter() { AUD.music('title'); },
      update() {
        if (start < 0) return;
        if (ENG.btnp('A') || ENG.btnp('B') || ENG.btnp('START')) {
          AUD.sfx('ok');
          ENG.replace(TitleScene());
        }
      },
      draw(ctx) {
        if (start < 0) start = G.frame;
        let e = (G.frame - start) % total;           // loop = attract mode
        let idx = 0, acc = 0;
        while (idx < SHOTS.length - 1 && e >= acc + SHOTS[idx].dur) { acc += SHOTS[idx].dur; idx++; }
        const shot = SHOTS[idx], lf = e - acc, p = lf / shot.dur;
        if (idx !== shotIdx) { shotIdx = idx; if (shot.music) AUD.music(shot.music); }
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, G.W, G.H);
        shot.draw(p, ctx, lf);
        // cross-fade black at shot edges
        let fade = 0;
        if (lf < 12) fade = 1 - lf / 12;
        else if (lf > shot.dur - 12) fade = (lf - (shot.dur - 12)) / 12;
        if (fade > 0.01) { ctx.globalAlpha = fade; ctx.fillStyle = '#000'; ctx.fillRect(0, 0, G.W, G.H); ctx.globalAlpha = 1; }
        // cinematic letterbox + vignette + film grain
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, G.W, 12); ctx.fillRect(0, G.H - 12, G.W, 12);
        const vg = ctx.createRadialGradient(120, 80, 60, 120, 80, 150);
        vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,.4)');
        ctx.fillStyle = vg; ctx.fillRect(0, 0, G.W, G.H);
        for (let i = 0; i < 24; i++) { ctx.fillStyle = `rgba(255,255,255,${0.02 + Math.random() * 0.03})`; ctx.fillRect(Math.random() * G.W | 0, 12 + Math.random() * (G.H - 24) | 0, 1, 1); }
        // progress bar
        ctx.fillStyle = 'rgba(248,208,72,.7)'; ctx.fillRect(0, G.H - 2, G.W * (e / total), 2);
      },
    };
  }

  return {
    TitleScene, IntroScene, NameEntryScene, PauseMenu, CardScene,
    partySelect, partyMenu, SummaryScene, bagSelect, bagOverworld,
    DexScene, ShopScene, OptionsScene, EvolveScene, CreditsScene, GalleryScene,
    CoalitionScene, TrailerScene, checkAchievements, ACH,
    levelUpMon, learnMoveFlow,
  };
})();

</script>
  <script>
/* ============================================================
   MAIN — boot, canvas scaling, touch controls, debug API.
   ============================================================ */
(() => {
  window.addEventListener('error', e => console.error('[game error]', e.message, e.filename, e.lineno));
  window.addEventListener('unhandledrejection', e => console.error('[game async error]', e.reason && (e.reason.stack || e.reason.message || e.reason)));
  const canvas = document.getElementById('screen');
  G.canvas = canvas;
  G.ctx = canvas.getContext('2d');
  // HD backing store: logical space stays 240x160, device store is 480x320.
  // Terrain drawn from 32px tiles lands 1:1 on device pixels; sprites stay 2x chunky.
  G.ctx.scale(2, 2);
  G.ctx.imageSmoothingEnabled = false;

  function fit() {
    // the GBA shell adds side zones (D-pad / A-B) on wide screens
    const wide = window.innerWidth >= 820;
    const availW = window.innerWidth - (wide ? 470 : 90);
    const availH = window.innerHeight - (wide ? 240 : 160);
    let scale = Math.max(1, Math.min(Math.floor(availW / G.W), Math.floor(availH / G.H)));
    if (scale > 2 && scale % 2) scale--; // even scales keep device pixels integer-crisp
    if (window.innerWidth < 700) scale = Math.max(1, Math.min(availW / G.W, (window.innerHeight - 120) / G.H));
    canvas.style.width = (G.W * scale) + 'px';
    canvas.style.height = (G.H * scale) + 'px';
  }
  window.addEventListener('resize', fit);
  fit();

  // touch controls -> synthetic keys
  const tmap = {
    't-up': 'ArrowUp', 't-down': 'ArrowDown', 't-left': 'ArrowLeft', 't-right': 'ArrowRight', 't-a': 'z', 't-b': 'x', 't-start': 'Enter',
    'g-up': 'ArrowUp', 'g-down': 'ArrowDown', 'g-left': 'ArrowLeft', 'g-right': 'ArrowRight', 'g-a': 'z', 'g-b': 'x', 'g-start': 'Enter',
  };
  const sel = document.getElementById('g-select'); // SELECT = mute, like a proper easter egg
  if (sel) sel.addEventListener('pointerdown', e => { e.preventDefault(); AUD.unlock(); AUD.toggleMute(); });
  for (const id in tmap) {
    const el = document.getElementById(id);
    if (!el) continue;
    const key = tmap[id];
    el.addEventListener('pointerdown', e => { e.preventDefault(); AUD.unlock(); ENG.pressKey(key, true); });
    el.addEventListener('pointerup', e => { e.preventDefault(); ENG.pressKey(key, false); });
    el.addEventListener('pointerleave', () => ENG.pressKey(key, false));
    el.addEventListener('pointercancel', () => ENG.pressKey(key, false));
  }

  // boot
  const hash = location.hash.replace('#', '');
  if (hash === 'gallery') ENG.push(SCN.GalleryScene());
  else if (hash === 'trailer') ENG.push(SCN.TrailerScene());
  else ENG.push(SCN.TitleScene());
  ENG.start();

  /* ---------- debug console API ---------- */
  window.G = G;
  window.DBG = {
    key: (k, frames = 1) => { ENG.pressKey(k, true); setTimeout(() => ENG.pressKey(k, false), frames * 17); },
    warp(map, x, y) { OW.loadMap(map); G.x = x; G.y = y; if (!G.scenes.includes(OW.scene)) { G.scenes.length = 0; ENG.push(OW.scene); } },
    give(item, n = 1) { G.bag[item] = (G.bag[item] || 0) + n; },
    mon(sp, lv = 10) { G.party.push(DATA.makeMon(sp, lv)); G.dex.seen[sp] = G.dex.caught[sp] = true; },
    heal() { for (const m of G.party) { m.hp = m.maxhp; m.status = null; } },
    money(n) { G.money += n; },
    newgame(name = 'RED') { ENG.newGame(name); OW.loadMap('home'); G.scenes.length = 0; ENG.push(OW.scene); },
    flags() { return G.flags; },
    scene() { return ENG.top(); },
  };
  console.log('%cMONSTER QUEST: CRIMSON', 'color:#d83028;font-weight:bold', 'loaded. Debug API: window.DBG');
})();

</script>
