  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:radial-gradient(1200px 800px at 50% 18%, #2b2e50 0%, #171833 55%, #0a0b18 100%);

    -webkit-user-select:none;user-select:none;touch-action:manipulation;overflow:hidden;
  }
  /* ================= GBA body ================= */
  .gba{
    position:relative;
    background:linear-gradient(165deg,#8478d4 0%,#6a5fbb 42%,#4e4694 100%);
    border-radius:64px;
    padding:26px 26px 20px;
    box-shadow:0 30px 90px rgba(0,0,0,.65),
      inset 0 3px 3px rgba(255,255,255,.30),
      inset 0 -10px 22px rgba(20,10,50,.45),
      inset 4px 0 10px rgba(255,255,255,.08),
      inset -4px 0 10px rgba(20,10,50,.25);
  }
  .shoulder{
    position:absolute;top:-13px;width:130px;height:26px;
    background:linear-gradient(180deg,#6c62b8,#544b9e);
    border-radius:16px 16px 4px 4px;
    box-shadow:inset 0 2px 2px rgba(255,255,255,.3), 0 -2px 6px rgba(0,0,0,.25);
    color:#d6d0f6;font-size:10px;font-weight:800;letter-spacing:1px;
    display:flex;align-items:flex-start;justify-content:center;padding-top:2px;
  }
  .shoulder.l{left:34px}
  .shoulder.r{right:34px}
  .gba-row{display:flex;align-items:center;gap:22px}
  /* ---- left: D-pad + start/select ---- */
  .pad-zone{display:flex;flex-direction:column;align-items:center;gap:22px;width:128px}
  .dpad{position:relative;width:104px;height:104px;filter:drop-shadow(0 4px 6px rgba(0,0,0,.4))}
  .dpad::before,.dpad::after{content:'';position:absolute;background:linear-gradient(180deg,#413d4e,#312d3c);border-radius:9px}
  .dpad::before{left:0;top:35px;width:104px;height:34px}
  .dpad::after{left:35px;top:0;width:34px;height:104px}
  .dpad .hub{position:absolute;left:39px;top:39px;width:26px;height:26px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#4a4658,#2e2a3a 70%);z-index:2;
    box-shadow:inset 0 2px 3px rgba(0,0,0,.5)}
  .dp{position:absolute;width:36px;height:36px;z-index:3;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .dp::after{content:'';border:6px solid transparent;opacity:.55}
  .dp:active{filter:brightness(1.35)}
  #g-up{left:34px;top:0}      #g-up::after{border-bottom-color:#57506b;margin-top:-6px}
  #g-down{left:34px;bottom:0} #g-down::after{border-top-color:#57506b;margin-bottom:-6px}
  #g-left{left:0;top:34px}    #g-left::after{border-right-color:#57506b;margin-left:-6px}
  #g-right{right:0;top:34px}  #g-right::after{border-left-color:#57506b;margin-right:-6px}
  .ss{display:flex;gap:16px}
  .ss .pill{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
  .ss .pill:active .bar{filter:brightness(1.4)}
  .ss .bar{width:52px;height:13px;border-radius:8px;transform:rotate(-24deg);
    background:linear-gradient(180deg,#403c4d,#2d2938);
    box-shadow:inset 0 2px 2px rgba(255,255,255,.15), 0 2px 3px rgba(0,0,0,.4)}
  .ss span{font-size:8.5px;font-weight:800;letter-spacing:1px;color:#c9c2f0;text-shadow:0 1px 1px rgba(0,0,0,.4)}

    background:linear-gradient(180deg,#37333f 0%,#232029 100%);
    border-radius:12px 12px 34px 34px;
    padding:8px 30px 22px;
    box-shadow:inset 0 2px 6px rgba(0,0,0,.7), 0 1px 0 rgba(255,255,255,.18);

    display:flex;align-items:center;justify-content:center;gap:10px;
    padding:6px 0 7px;color:#b9b1e2;font-size:10px;font-weight:700;letter-spacing:3.5px;

  .bezel{background:#0c0b12;padding:7px;border-radius:6px;box-shadow:inset 0 3px 10px rgba(0,0,0,.9)}
  canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;background:#000;border-radius:2px}

  .ab{display:flex;gap:12px;transform:rotate(-24deg)}
  .btn{
    width:52px;height:52px;border-radius:50%;cursor:pointer;
    background:radial-gradient(circle at 35% 28%,#bcb4ea,#9188cf 62%,#7b71bf);
    box-shadow:0 5px 9px rgba(0,0,0,.4), inset 0 -4px 6px rgba(40,25,90,.35), inset 0 3px 4px rgba(255,255,255,.4);
    color:#453c85;font-weight:800;font-size:20px;
    display:flex;align-items:center;justify-content:center;
  }
  .btn:active{transform:translateY(2px);box-shadow:0 2px 4px rgba(0,0,0,.4), inset 0 -2px 4px rgba(40,25,90,.35)}
  .btn.b{margin-top:30px}
  .speaker{display:flex;gap:7px;transform:rotate(-58deg);margin-top:6px}
  .speaker i{width:5px;height:42px;border-radius:3px;background:#453e77;
    box-shadow:inset 0 2px 3px rgba(0,0,0,.55), 0 1px 0 rgba(255,255,255,.12)}
  /* ---- bottom brand (the "Nintendo spot") ---- */
  .gba-brand{
    text-align:center;margin-top:12px;
    font-size:13px;font-weight:800;letter-spacing:3px;color:#d6d0f6;
    text-shadow:0 -1px 0 rgba(20,10,50,.55), 0 1px 1px rgba(255,255,255,.28);
  }
  .gba-brand small{font-weight:700;font-size:9px;letter-spacing:2px;color:#a79ede;display:block;margin-top:1px}
  /* ---- page hints ---- */
  .hint{font-size:11.5px;line-height:1.8;text-align:center;letter-spacing:.4px}
  .hint b{color:#d7dbf5;background:#23264a;padding:1px 7px;border-radius:4px;font-weight:600}
  .credit{
    background:linear-gradient(180deg,#f6d56d,#d9a83f);
    color:#3a2b0e;padding:2px 12px;border-radius:6px;font-weight:800;letter-spacing:1.5px;
    box-shadow:0 0 14px rgba(246,208,100,.35), inset 0 1px 0 rgba(255,255,255,.55), inset 0 -1px 0 rgba(120,80,10,.35);
    text-shadow:0 1px 0 rgba(255,255,255,.35);
  }
  /* ---- small screens: slim shell, mobile overlay takes over ---- */
  @media (max-width:820px){
    .pad-zone,.btn-zone,.shoulder{display:none}
    .gba{padding:14px 14px 10px;border-radius:26px}
    .glass{padding:6px 10px 12px;border-radius:8px 8px 18px 18px}
    .gba-brand{margin-top:8px;font-size:11px}
  }
  /* ---- touch controls (mobile overlay) ---- */
  #touch{display:none;position:fixed;inset:0;pointer-events:none;z-index:9}
  @media (pointer:coarse){ #touch{display:block} body{overflow:hidden} .hint{display:none} }
  .tbtn{position:absolute;pointer-events:auto;background:rgba(35,38,74,.72);border:2px solid rgba(215,219,245,.35);
    color:#d7dbf5;border-radius:12px;display:flex;align-items:center;justify-content:center;

  <script>
/* ============================================================
   FONT — native canvas text with full Hebrew shaping.
   The canvas backing store runs at 2x, so a 7px-logical font
   rasterizes at 14 device px — crisp, pleasant, readable.
   The browser handles bidi/RTL layout natively (ctx.direction),
   so mixed Hebrew/Latin/number strings come out correct.
   API kept compatible: draw / width / center / right / bidi / isRTL.
   ============================================================ */
const FONT = (() => {
  const STACK = '"Heebo","Rubik","Assistant",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Arial Hebrew","Noto Sans Hebrew",Arial,sans-serif';
  const HEBRX = /[֐-׿]/;
  const isRTL = s => HEBRX.test(String(s));
  const bidi = s => String(s); // layout is native now; kept for API compatibility

  function setFont(ctx, scale) {
    ctx.font = (scale > 1 ? '800 ' : '600 ') + (7 * scale) + 'px ' + STACK;
    ctx.textBaseline = 'top';
  }
  function paint(ctx, text, x, y, color, opts, align) {
    const sc = opts.scale || 1;
    ctx.save();
    setFont(ctx, sc);
    ctx.textAlign = align;
    ctx.direction = isRTL(text) ? 'rtl' : 'ltr';
    const off = 0.5 * sc + 0.5;
    if (opts.shadow) { ctx.fillStyle = opts.shadow; ctx.fillText(text, x + off, y + off); }
    ctx.fillStyle = color;
    ctx.fillText(text, x, y);
    ctx.restore();
  }
  // left-anchored (x = left edge of the rendered string)
  function draw(ctx, text, x, y, color = '#383838', opts = {}) {
    paint(ctx, String(text), x, y, color, opts, 'left');
  }
  // right-anchored (x = right edge) — natural anchor for Hebrew UI
  function right(ctx, text, xRight, y, color = '#383838', opts = {}) {
    paint(ctx, String(text), xRight, y, color, opts, 'right');
  }
  function center(ctx, text, cx, y, color = '#383838', opts = {}) {
    paint(ctx, String(text), cx, y, color, opts, 'center');
  }
  // measured width in logical px
  let mctx = null;
  function width(text, scale = 1) {
    if (!mctx) mctx = document.createElement('canvas').getContext('2d');
    setFont(mctx, scale);
    return mctx.measureText(String(text)).width;
  }
  return { draw, width, center, right, bidi, isRTL };
})();

</script>
  <script>
/* ============================================================
   SPRITES — pixel-art decoder, tileset, character sheets.
   Art is authored as string grids; '.' = transparent.
   mk() pads short rows, so trailing dots may be omitted.
   ============================================================ */
const SPR = (() => {

  function mk(rows, pal, w) {
    w = w || Math.max(...rows.map(r => r.length));
    const h = rows.length;
    const c = document.createElement('canvas'); c.width = w; c.height = h;
    const g = c.getContext('2d');
    const img = g.createImageData(w, h);
    for (let y = 0; y < h; y++) {
      const row = rows[y] || '';
      for (let x = 0; x < w; x++) {
        const ch = row[x] || '.';
        if (ch === '.') continue;
        const col = pal[ch];
        if (!col) continue;
        const n = parseInt(col.slice(1), 16);
        const i = (y * w + x) * 4;
        img.data[i] = (n >> 16) & 255; img.data[i + 1] = (n >> 8) & 255;
        img.data[i + 2] = n & 255; img.data[i + 3] = 255;
      }
    }
    g.putImageData(img, 0, 0);
    return c;
  }

  function flipH(src) {
    const c = document.createElement('canvas'); c.width = src.width; c.height = src.height;
    const g = c.getContext('2d');
    g.translate(src.width, 0); g.scale(-1, 1); g.drawImage(src, 0, 0);
    return c;
  }

  function tint(src, color, alpha) { // silhouette in a color (for evolution flash)
    const c = document.createElement('canvas'); c.width = src.width; c.height = src.height;
    const g = c.getContext('2d');
    g.drawImage(src, 0, 0);
    g.globalCompositeOperation = 'source-in';
    g.globalAlpha = alpha == null ? 1 : alpha;
    g.fillStyle = color; g.fillRect(0, 0, c.width, c.height);
    return c;
  }

  /* ---- Scale2x (EPX): smooth 2x upscale that rounds jaggies ---- */
  function scale2x(src) {
    const w = src.width, h = src.height;
    const sg = src.getContext ? src.getContext('2d') : null;
    const inD = sg.getImageData(0, 0, w, h);
    const inP = new Uint32Array(inD.data.buffer);
    const out = document.createElement('canvas'); out.width = w * 2; out.height = h * 2;
    const og = out.getContext('2d');
    const outD = og.createImageData(w * 2, h * 2);
    const outP = new Uint32Array(outD.data.buffer);
    const at = (x, y) => (x < 0 || y < 0 || x >= w || y >= h) ? 0 : inP[y * w + x];
    for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
      const P = inP[y * w + x];
      const A = at(x, y - 1), B = at(x + 1, y), C = at(x - 1, y), D = at(x, y + 1);
      let e0 = P, e1 = P, e2 = P, e3 = P;
      if (C === A && C !== D && A !== B) e0 = A;
      if (A === B && A !== C && B !== D) e1 = B;
      if (D === C && D !== B && C !== A) e2 = C;
      if (B === D && B !== A && D !== C) e3 = D;
      const oy = y * 2 * w * 2, ox = x * 2;
      outP[oy + ox] = e0; outP[oy + ox + 1] = e1;
      outP[oy + w * 2 + ox] = e2; outP[oy + w * 2 + ox + 1] = e3;
    }
    og.putImageData(outD, 0, 0);
    return out;
  }

  /* ---- soft top-light ramp inside the silhouette (pseudo-3D rounding) ---- */
  function relight(c, top = 0.10, bottom = 0.12) {
    const g = c.getContext('2d');
    const img = g.getImageData(0, 0, c.width, c.height), d = img.data;
    // find silhouette vertical bounds per column for a local ramp
    for (let x = 0; x < c.width; x++) {
      let y0 = -1, y1 = -1;
      for (let y = 0; y < c.height; y++) if (d[(y * c.width + x) * 4 + 3] > 60) { if (y0 < 0) y0 = y; y1 = y; }
      if (y0 < 0) continue;
      const span = Math.max(1, y1 - y0);
      for (let y = y0; y <= y1; y++) {
        const i = (y * c.width + x) * 4;
        if (d[i + 3] <= 60) continue;
        const t = (y - y0) / span; // 0 top .. 1 bottom
        const f = 1 + top * (1 - t) - bottom * t;
        d[i] = Math.min(255, d[i] * f);
        d[i + 1] = Math.min(255, d[i + 1] * f);
        d[i + 2] = Math.min(255, d[i + 2] * f);
      }
    }
    g.putImageData(img, 0, 0);
    return c;
  }

  // simple seeded rng for deterministic speckle tiles
  function srng(seed) { let s = seed; return () => (s = (s * 1103515245 + 12345) & 0x7fffffff) / 0x7fffffff; }

  function speckleTile(base, specks, seed, count) {
    const c = document.createElement('canvas'); c.width = 16; c.height = 16;
    const g = c.getContext('2d');
    g.fillStyle = base; g.fillRect(0, 0, 16, 16);
    const r = srng(seed);
    for (let i = 0; i < (count || 14); i++) {
      g.fillStyle = specks[Math.floor(r() * specks.length)];
      const x = Math.floor(r() * 16), y = Math.floor(r() * 16);
      g.fillRect(x, y, 1 + Math.floor(r() * 2), 1);
    }
    return c;
  }

  /* ---------------- TILES ---------------- */
  const T = {};

  T.grass  = speckleTile('#8fce6a', ['#7cba58', '#a2dd7d', '#7cba58'], 7, 16);
  T.grass2 = speckleTile('#8fce6a', ['#7cba58', '#6aab49', '#a2dd7d'], 99, 22);
  T.path   = speckleTile('#e8d5a3', ['#d9bf85', '#f2e4bd', '#d9bf85'], 31, 14);
  T.intFloor = speckleTile('#e8d0b0', ['#dcc09a', '#f0dcc0'], 5, 8);
  T.caveFloor = speckleTile('#6b5a58', ['#5d4c4a', '#7a6a66', '#584744'], 55, 20);

  const PG = { g: '#8fce6a', d: '#3f8f3f', m: '#5cb054', o: '#2e6b2e', l: '#79c46a' };
  T.tallgrass = mk([
    'gggggggggggggggg',
    'gdggmdggdgmggdgg',
    'gdmgdddgddgdgddg',
    'ddddddmdddddmddd',
    'dmdodddoddoddddd',
    'ddddmddddddddmdd',
    'godddoddmoddoddg',
    'dddmdddddddddddd',
    'gddoddgoddoddmdg',
    'gdddddddmddddddg',
    'ggdmdgddddgdmdgg',
    'ggddggdmdggddggg',
    'gggdgggddgggdggg',
    'gggggggggggggggg',
    'gggggggggggggggg',
    'gggggggggggggggg',
  ], PG);
  // overlay drawn over the player when standing in tall grass (top blades)
  T.tallgrassTop = mk([
    '................',
    '................',
    '................',
    '................',
    '................',
    '................',
    'g.ddd..dd..ddd.g',
    'dddmdddddddddddd',
    'gddoddgoddoddmdg',
    'gdddddddmddddddg',
    'ggdmdgddddgdmdgg',
    'ggddggdmdggddggg',
    'gggdgggddgggdggg',
    'gggggggggggggggg',
    'gggggggggggggggg',
    'gggggggggggggggg',
  ], PG);

  const PT = { o: '#1e4a22', d: '#2e7d32', g: '#48a048', l: '#66bb6a', t: '#7a4a28', T: '#5a3018', b: '#8fce6a' };
  T.tree = mk([
    'bbbboooooooobbbb',
    'bbooddggggddoobb',
    'boddgglllggddob.',
    'odggglllllgggdo.',
    'odgglllgglllgdo.',
    'oggllgggggllggo.',
    'odggggllggggddo.',
    'oddgglllllggddo.',
    'boddgglggggddob.',
    'booddddddddddob.',
    'bboooddddoooobbb',
    'bbbbootttoobbbbb',
    'bbbbbotTtobbbbbb',
    'bbbbbotTtobbbbbb',
    'bbbbootttoobbbbb',
    'bbboooooooobbbbb',
  ], PT);

  function waterFrame(phase) {
    const c = document.createElement('canvas'); c.width = 16; c.height = 16;
    const g = c.getContext('2d');
    g.fillStyle = '#4596e8'; g.fillRect(0, 0, 16, 16);
    g.fillStyle = '#3a80cc';
    for (let y = 0; y < 16; y += 4) g.fillRect(0, (y + phase) % 16, 16, 1);
    g.fillStyle = '#8cc8f8';
    const r = srng(11 + phase);
    for (let i = 0; i < 6; i++) {
      const x = Math.floor(r() * 13), y = (Math.floor(r() * 16) + phase * 2) % 16;
      g.fillRect(x, y, 3, 1);
    }
    return c;
  }
  T.water0 = waterFrame(0); T.water1 = waterFrame(2);

  const PF = { g: '#8fce6a', d: '#7cba58', r: '#e84860', R: '#c02848', y: '#f8d838', G: '#48941f', o: '#a2dd7d' };
  T.flower0 = mk([
    'gggggggggggggggg','ggggggggggggdggg','ggdgggrrgggggggg','gggggrRrrggggggg',
    'gggggrryrrgggggg','ggggggryrggggdgg','gggGggrrggGggggg','ggggGgGgGGgggggg',
    'gggggGGGGggggggg','ggdggggGgggggggg','gggggggGggrrgggg','ggggggggggryrggg',
    'gggogggggggrgggg','gggggggggggGgggg','ggggggdggggGgggg','gggggggggggggggg',

const MONART3 = {};

(() => {
  const S = 48;
  function cv() { const c = document.createElement('canvas'); c.width = S; c.height = S; return c; }

  function shade(hex, f) {
    const n = parseInt(hex.slice(1), 16);
    const ch = v => Math.max(0, Math.min(255, Math.round(v + (f > 0 ? (255 - v) * f : v * f))));
    return '#' + [(n >> 16) & 255, (n >> 8) & 255, n & 255].map(v => ch(v).toString(16).padStart(2, '0')).join('');
  }
  function srng(seed) { let s = seed | 0 || 1; return () => (s = (s * 1103515245 + 12345) & 0x7fffffff) / 0x7fffffff; }

  /* edge bevel: light catches top/left rims, shadow hugs bottom/right */
  function bevel(c) {
    const g = c.getContext('2d');
    const img = g.getImageData(0, 0, S, S), d = img.data;
    const a = (x, y) => (x < 0 || y < 0 || x >= S || y >= S) ? 0 : d[(y * S + x) * 4 + 3];
    const mul = (i, f) => { d[i] = Math.min(255, d[i] * f); d[i + 1] = Math.min(255, d[i + 1] * f); d[i + 2] = Math.min(255, d[i + 2] * f); };
    for (let y = 0; y < S; y++) for (let x = 0; x < S; x++) {
      const i = (y * S + x) * 4;
      if (d[i + 3] <= 60) continue;
      if (a(x, y - 1) <= 60 || a(x - 1, y) <= 60) mul(i, 1.22);

   Song = {bpm, tracks:[{wave, vol, seq}]}; seq tokens:

   drum track tokens: K kick, S snare, H hat.
   Tracks of different lengths loop against the longest.

const AUD = (() => {
  let ac = null, master = null, musicBus = null, sfxBus = null;
  let muted = false, noiseBuf = null;

  const NOTE = { C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11 };

    const m = /^([A-G])(#?)(\d)$/.exec(tok);

      if (!m) { step++; continue; }

  /* ---------------- formulas ---------------- */
  const expForLevel = l => l * l * l; // medium-fast
  const MAXLEVEL = 50;

  let uid = 1;
  function makeMon(speciesId, level, opts = {}) {
    const sp = SPECIES[speciesId];
    const ivs = opts.ivs || [0,0,0,0,0,0].map(() => Math.floor(Math.random() * 16));
    const mon = {
      uid: uid++, species: speciesId, name: sp.name,
      level, exp: expForLevel(level), ivs,
      status: null, sleepTurns: 0,
      moves: movesAt(speciesId, level).map(id => ({ id, pp: MOVES[id].pp, maxpp: MOVES[id].pp })),
    };
    calcStats(mon);
    mon.hp = mon.maxhp;
    return mon;
  }
  function calcStats(mon) {
    const b = SPECIES[mon.species].base, iv = mon.ivs, L = mon.level;
    mon.maxhp = Math.floor((2 * b[0] + iv[0]) * L / 100) + L + 10;
    mon.atk = Math.floor((2 * b[1] + iv[1]) * L / 100) + 5;
    mon.def = Math.floor((2 * b[2] + iv[2]) * L / 100) + 5;
    mon.spa = Math.floor((2 * b[3] + iv[3]) * L / 100) + 5;
    mon.spd = Math.floor((2 * b[4] + iv[4]) * L / 100) + 5;
    mon.spe = Math.floor((2 * b[5] + iv[5]) * L / 100) + 5;
  }
  function movesAt(speciesId, level) {
    const learned = SPECIES[speciesId].learn.filter(([l]) => l <= level).map(([, m]) => m);
    const uniq = [...new Set(learned)];
    return uniq.slice(-4);
  }
  function movesLearnedAtLevel(speciesId, level) {
    return SPECIES[speciesId].learn.filter(([l]) => l === level).map(([, m]) => m);
  }
  function expGain(foe, isTrainer) {
    const base = SPECIES[foe.species].exp;
    // generous curve: the campaign trail should feel brisk, not grindy
    return Math.max(1, Math.floor(base * foe.level / 7 * (isTrainer ? 1.7 : 1.15)));
  }

    const counts = { 'ימין': 0, 'שמאל': 0, 'מרכז': 0, 'חרדי': 0 };
    for (const m of G.party) {
      const c = SPECIES[m.species].camp;
      if (counts[c] != null) counts[c]++;
    }
    const right = counts['ימין'] + counts['חרדי'], left = counts['שמאל'] + counts['מרכז'];

  <script>
/* ============================================================
   HD — high-detail terrain renderer.
   The canvas backing store is 2x the logical resolution, so
   everything here is authored at 32 device px per world tile:
   procedural textures, 4-bit autotiling with rounded corners,
   a pre-rendered ground layer per map, layered trees, and the
   lighting/atmosphere passes (shadows, clouds, grade).
   ============================================================ */
const HD = (() => {
  const TS = 32;               // device px per tile
  const T2 = v => v * 2;       // logical px -> device px

  function cv(w, h) { const c = document.createElement('canvas'); c.width = w; c.height = h; return c; }
  function srng(seed) { let s = seed | 0 || 1; return () => (s = (s * 1103515245 + 12345) & 0x7fffffff) / 0x7fffffff; }

  function speckle32(base, tones, seed, count, big) {
    const c = cv(TS, TS), g = c.getContext('2d');
    g.fillStyle = base; g.fillRect(0, 0, TS, TS);
    const r = srng(seed);
    for (let i = 0; i < count; i++) {
      g.fillStyle = tones[(r() * tones.length) | 0];
      g.fillRect((r() * TS) | 0, (r() * TS) | 0, 1 + ((r() * (big || 2)) | 0), 1);
    }
    return c;
  }

  /* ============ rounded autotile masks ============
     mask bits: 1=N open, 2=E open, 4=S open, 8=W open
     ("open" = neighbor belongs to the same group).       */
  function maskShape(mask, inset, rad) {
    const L = (mask & 8) ? -2 : inset, R = (mask & 2) ? TS + 2 : TS - inset;
    const Tp = (mask & 1) ? -2 : inset, B = (mask & 4) ? TS + 2 : TS - inset;
    const rTL = (!(mask & 1) && !(mask & 8)) ? rad : 0;
    const rTR = (!(mask & 1) && !(mask & 2)) ? rad : 0;
    const rBL = (!(mask & 4) && !(mask & 8)) ? rad : 0;
    const rBR = (!(mask & 4) && !(mask & 2)) ? rad : 0;
    return (x, y) => {
      if (x < L || x >= R || y < Tp || y >= B) return false;
      const cx = x + 0.5, cy = y + 0.5;
      if (rTL && cx < L + rTL && cy < Tp + rTL) return ((cx - L - rTL) ** 2 + (cy - Tp - rTL) ** 2) <= rTL * rTL;
      if (rTR && cx > R - rTR && cy < Tp + rTR) return ((cx - R + rTR) ** 2 + (cy - Tp - rTR) ** 2) <= rTR * rTR;
      if (rBL && cx < L + rBL && cy > B - rBL) return ((cx - L - rBL) ** 2 + (cy - B + rBL) ** 2) <= rBL * rBL;
      if (rBR && cx > R - rBR && cy > B - rBR) return ((cx - R + rBR) ** 2 + (cy - B + rBR) ** 2) <= rBR * rBR;
      return true;

    const c = cv(TS, TS), g = c.getContext('2d');

    };

      if (!inside(x, y)) continue;
      let edge = false;
      for (let d = 1; d <= (rimW || 2) && !edge; d++)
        if (!inside(x - d, y) || !inside(x + d, y) || !inside(x, y - d) || !inside(x, y + d)) edge = true;

  <script>
/* ============================================================
   ENGINE — game state, fixed-step loop, input, scene stack,
   async script helpers (frames / button waits / tweens), save.
   ============================================================ */
const G = {
  W: 240, H: 160,
  canvas: null, ctx: null,
  frame: 0, playFrames: 0,
  scenes: [],
  keys: {}, pressed: {}, held: {},
  // world state
  map: 'home', x: 2, y: 4, dir: 'down',
  name: 'RED',
  party: [], bag: {}, money: 3000, badges: [],
  flags: {}, dex: { seen: {}, caught: {} },
  healSpot: { map: 'home', x: 4, y: 5, dir: 'down' },
  textSpeed: 2,
  fade: 0, // 0 clear .. 1 black
  _timers: [], _waiters: [], _tweens: [],
};

const ENG = (() => {
  const BTN = {
    A: ['z', 'Z', ' '], B: ['x', 'X', 'Escape', 'Backspace'], START: ['Enter'],
    UP: ['ArrowUp', 'w', 'W'], DOWN: ['ArrowDown', 's', 'S'],
    LEFT: ['ArrowLeft', 'a', 'A'], RIGHT: ['ArrowRight', 'd', 'D'],
    RUN: ['Shift'],
  };
  const heldFrames = {};

  function initInput() {
    window.addEventListener('keydown', e => {
      AUD.unlock();
      if (e.key === 'm' || e.key === 'M') { AUD.toggleMute(); return; }
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'Enter', 'Backspace'].includes(e.key)) e.preventDefault();
      if (!G.keys[e.key]) G.pressed[e.key] = true;
      G.keys[e.key] = true;
    });
    window.addEventListener('keyup', e => { G.keys[e.key] = false; });
    window.addEventListener('blur', () => { for (const k in G.keys) G.keys[k] = false; });
    window.addEventListener('pointerdown', () => AUD.unlock(), { once: false });
  }
  // simulate a key (used by touch controls and debug driver)
  function pressKey(k, down) {
    if (down && !G.keys[k]) G.pressed[k] = true;
    G.keys[k] = down;
  }

  const btn  = n => BTN[n].some(k => G.keys[k]);
  const btnp = n => BTN[n].some(k => G.pressed[k]);
  // press-or-repeat (menus / held navigation)
  function btnr(n) {
    if (btnp(n)) return true;
    const h = heldFrames[n] || 0;
    return h > 14 && h % 5 === 0;
  }
  function trackHeld() {
    for (const n in BTN) heldFrames[n] = btn(n) ? (heldFrames[n] || 0) + 1 : 0;
  }
  function dirPressed() {
    if (btn('UP')) return 'up'; if (btn('DOWN')) return 'down';
    if (btn('LEFT')) return 'left'; if (btn('RIGHT')) return 'right';
    return null;
  }

  /* ---------- scene stack ---------- */
  function push(s) { G.scenes.push(s); if (s.onEnter) s.onEnter(); return s; }
  function pop() { const s = G.scenes.pop(); if (s && s.onExit) s.onExit(); return s; }
  function replace(s) { pop(); return push(s); }
  function top() { return G.scenes[G.scenes.length - 1]; }

  /* ---------- async helpers ---------- */
  const wait = n => new Promise(r => G._timers.push({ n, r }));
  const waitBtn = (...names) => new Promise(r => G._waiters.push({ names, r }));
  function tween(obj, key, to, frames, ease) {
    return new Promise(r => G._tweens.push({ obj, key, from: obj[key], to, frames, t: 0, ease: ease || (x => x), r }));
  }
  async function fadeOut(frames = 14) { await tween(G, 'fade', 1, frames); }
  async function fadeIn(frames = 14) { await tween(G, 'fade', 0, frames); }
  async function flashScreen(times = 2, hold = 5) {
    for (let i = 0; i < times; i++) { G.flash = true; await wait(hold); G.flash = false; await wait(hold); }
  }

  /* ---------- rng ---------- */
  const ri = (a, b) => a + Math.floor(Math.random() * (b - a + 1));
  const chance = p => Math.random() < p;
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];
  function weighted(table) { // [[val,, , weight],...] -> row
    const tot = table.reduce((s, row) => s + row[3], 0);
    let r = Math.random() * tot;
    for (const row of table) { r -= row[3]; if (r <= 0) return row; }
    return table[table.length - 1];
  }

  /* ---------- save / load ---------- */
  const SAVEKEY = 'pokemon.knesset.save.v1';
  let memFallback = null;
  function saveGame() {
    const data = {
      ver: 1, name: G.name, map: G.map, x: G.x, y: G.y, dir: G.dir,
      party: G.party, bag: G.bag, money: G.money, badges: G.badges,
      flags: G.flags, dex: G.dex, healSpot: G.healSpot,
      textSpeed: G.textSpeed, playFrames: G.playFrames,
    };
    try { localStorage.setItem(SAVEKEY, JSON.stringify(data)); }
    catch (e) { memFallback = JSON.stringify(data); }
    return true;
  }
  function loadGame() {
    let raw = null;
    try { raw = localStorage.getItem(SAVEKEY); } catch (e) { raw = memFallback; }
    if (!raw) return false;
    try {
      const d = JSON.parse(raw);
      Object.assign(G, {
        name: d.name, map: d.map, x: d.x, y: d.y, dir: d.dir,
        party: d.party, bag: d.bag, money: d.money, badges: d.badges || [],
        flags: d.flags, dex: d.dex, healSpot: d.healSpot,
        textSpeed: d.textSpeed != null ? d.textSpeed : 2, playFrames: d.playFrames || 0,
      });
      return true;
    } catch (e) { return false; }
  }
  function hasSave() {
    try { return !!localStorage.getItem(SAVEKEY); } catch (e) { return !!memFallback; }
  }
  function newGame(name) {
    Object.assign(G, {
      name: name || 'דני', map: 'home', x: 2, y: 4, dir: 'down',
      party: [], bag: { POTION: 3 }, money: 3000, badges: [],
      flags: {}, dex: { seen: {}, caught: {} },
      healSpot: { map: 'home', x: 4, y: 5, dir: 'down' },
      playFrames: 0,
    });
  }

  /* ---------- main loop ---------- */
  let last = 0, acc = 0, lastTick = 0;
  const STEP = 1000 / 60;
  function stepFrame() {
    G.frame++; G.playFrames++;
    trackHeld();
    // timers
    for (let i = G._timers.length - 1; i >= 0; i--) {
      const t = G._timers[i];
      if (--t.n <= 0) { G._timers.splice(i, 1); t.r(); }
    }
    // tweens
    for (let i = G._tweens.length - 1; i >= 0; i--) {
      const w = G._tweens[i];
      w.t++;
      const p = Math.min(1, w.t / w.frames);
      w.obj[w.key] = w.from + (w.to - w.from) * w.ease(p);
      if (p >= 1) { G._tweens.splice(i, 1); w.r(); }
    }
    // button waiters (before scene update; consume the press)
    for (let i = G._waiters.length - 1; i >= 0; i--) {
      const w = G._waiters[i];
      const hit = w.names.find(n => btnp(n));
      if (hit) {
        G._waiters.splice(i, 1);
        for (const k of BTN[hit]) delete G.pressed[k];
        w.r(hit);
      }
    }
    const t = top();
    if (t && t.update) t.update();
    G.pressed = {};
  }
  function draw() {
    const ctx = G.ctx;
    ctx.imageSmoothingEnabled = false;
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, G.W, G.H);
    // draw scenes from the lowest opaque one up
    let start = 0;
    for (let i = G.scenes.length - 1; i >= 0; i--) {
      if (G.scenes[i].opaque) { start = i; break; }
    }
    for (let i = start; i < G.scenes.length; i++) {
      if (G.scenes[i].draw) G.scenes[i].draw(ctx);
    }
    if (G.flash) { ctx.fillStyle = '#f8f8f8'; ctx.fillRect(0, 0, G.W, G.H); }
    if (G.fade > 0.002) {
      ctx.globalAlpha = Math.min(1, G.fade);
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, G.W, G.H);
      ctx.globalAlpha = 1;
    }
  }
  function pump(now) {
    if (!last) last = now;
    acc += Math.min(200, now - last); last = now;
    while (acc >= STEP) { stepFrame(); acc -= STEP; }
    draw();
    lastTick = performance.now();
  }
  function loop(now) { requestAnimationFrame(loop); pump(now); }
  function start() {
    initInput();
    requestAnimationFrame(loop);
    // keep ticking when rAF is throttled (hidden/backgrounded tab)
    setInterval(() => { const now = performance.now(); if (now - lastTick > 80) pump(now); }, 50);
  }

  return {
    BTN, btn, btnp, btnr, dirPressed, pressKey,
    push, pop, replace, top,
    wait, waitBtn, tween, fadeOut, fadeIn, flashScreen,
    ri, chance, pick, weighted,
    saveGame, loadGame, hasSave, newGame,
    start,
  };
})();

/* ============================================================
   UI — panels, typewriter textbox, menus, HP/EXP bars, badges.
   ============================================================ */
const UI = (() => {
  const COL = {
    text: '#404048', shadow: '#d8d8d0', light: '#888890',
    panel: '#f8f8f8', borderOut: '#38404c', borderIn: '#b8c4d8',
    hpGreen: '#48c858', hpYellow: '#f0c838', hpRed: '#e85040',
    hpBack: '#505860', exp: '#4890f0', red: '#d83028', blue: '#3060c8',

  function shade(hex, f) { // lighten (f>0) / darken (f<0)

    ctx.fillStyle = COL.borderOut;
    rr(ctx, x, y, w, h, 4); ctx.fill();

  }

  /* ---------- menu ---------- */
  function MenuScene(options, opts = {}) {
    const labels = options.map(o => typeof o === 'string' ? o : o.label);
    const rights = options.map(o => typeof o === 'string' ? null : o.right);
    const wLabel = Math.ceil(Math.max(...labels.map(l => FONT.width(l))));
    const wRight = Math.max(0, ...rights.map(r => (r ? r.length * 6 + 8 : 0)));
    const w = opts.w || Math.max(60, wLabel + wRight + 26);
    const h = labels.length * 14 + 12;
    const x = opts.x != null ? opts.x : G.W - w - 3;
    const y = opts.y != null ? opts.y : 3;
    return {
      idx: opts.idx || 0, resolve: null,
      update() {
        if (ENG.btnr('UP')) { this.idx = (this.idx + labels.length - 1) % labels.length; AUD.sfx('sel'); }
        if (ENG.btnr('DOWN')) { this.idx = (this.idx + 1) % labels.length; AUD.sfx('sel'); }
        if (ENG.btnp('A')) { AUD.sfx('ok'); ENG.pop(); this.resolve(this.idx); }
        else if (ENG.btnp('B') && opts.cancel !== false) { AUD.sfx('cancel'); ENG.pop(); this.resolve(-1); }
      },
      draw(ctx) {
        panel(ctx, x, y, w, h);
        const rtl = labels.some(l => FONT.isRTL(l));
        labels.forEach((l, i) => {
          if (rtl) {
            FONT.right(ctx, l, x + w - 16, y + 7 + i * 14, COL.text, { shadow: COL.shadow });
            if (rights[i]) text(ctx, rights[i], x + 8, y + 7 + i * 14, COL.light);
          } else {
            text(ctx, l, x + 16, y + 7 + i * 14);
            if (rights[i]) text(ctx, rights[i], x + w - 8 - rights[i].length * 6, y + 7 + i * 14, COL.light);
          }
        });
        if (rtl) text(ctx, '<', x + w - 11, y + 7 + this.idx * 14, COL.red, { noShadow: true, raw: true });
        else text(ctx, '>', x + 7, y + 7 + this.idx * 14, COL.red, { noShadow: true });
      },
    };
  }
  function menu(options, opts) {
    return new Promise(res => { const m = MenuScene(options, opts); m.resolve = res; ENG.push(m); });
  }
  // say(text) keeping the box open, then show a menu; returns chosen index
  async function ask(str, options, opts = {}) {
    await say(str, { sticky: true });
    const idx = await menu(options, { y: opts.y != null ? opts.y : BOX.y - options.length * 14 - 14, ...opts });
    closeBox();
    return idx;
  }

  /* ---------- gauges & tags ---------- */
  function hpColor(cur, max) {
    const p = cur / max;
    return p > 0.5 ? COL.hpGreen : p > 0.2 ? COL.hpYellow : COL.hpRed;
  }
  function hpBar(ctx, x, y, w, cur, max) {
    text(ctx, 'HP', x - 13, y - 1, '#f0a028', { noShadow: true, scale: 1, spacing: 5 });
    ctx.fillStyle = COL.borderOut; rr(ctx, x - 1, y - 1.5, w + 2, 7, 3); ctx.fill();
    ctx.fillStyle = COL.hpBack; rr(ctx, x, y - 0.5, w, 5, 2); ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,.35)'; ctx.fillRect(x, y - 0.5, w, 1.5);  // track inner shadow
    const fw = Math.round(w * 2 * Math.max(0, cur) / max) / 2;
    if (fw > 0) {
      const col = hpColor(cur, max);
      ctx.fillStyle = col; rr(ctx, x, y - 0.5, fw, 5, 2); ctx.fill();
      ctx.fillStyle = shade(col, 0.45); rr(ctx, x + 0.5, y, fw - 1, 1.5, 1); ctx.fill(); // shine
    }
  }
  function expBar(ctx, x, y, w, mon) {
    const lo = DATA.expForLevel(mon.level), hi = DATA.expForLevel(mon.level + 1);
    const p = mon.level >= DATA.MAXLEVEL ? 1 : Math.max(0, Math.min(1, (mon.exp - lo) / (hi - lo)));
    ctx.fillStyle = COL.borderOut; rr(ctx, x - 1, y - 1, w + 2, 5, 2); ctx.fill();
    ctx.fillStyle = '#283038'; ctx.fillRect(x, y, w, 2.5);
    const fw = Math.round(w * 2 * p) / 2;
    if (fw > 0) {
      ctx.fillStyle = COL.exp; ctx.fillRect(x, y, fw, 2.5);
      ctx.fillStyle = shade(COL.exp, 0.5); ctx.fillRect(x, y, fw, 1);
    }
  }
  function typeBadge(ctx, type, x, y) {
    ctx.fillStyle = COL.borderOut; rr(ctx, x - 1, y - 1, 36, 11, 3); ctx.fill();
    ctx.fillStyle = DATA.TYPECOLOR[type] || '#888'; rr(ctx, x, y, 34, 9, 2); ctx.fill();
    FONT.center(ctx, (DATA.TYPEHEB && DATA.TYPEHEB[type]) || type.slice(0, 8), x + 17, y + 1, '#f8f8f8', { noShadow: true });
  }
  function statusTag(ctx, status, x, y) {
    if (!status) return;
    const cmap = { PSN: '#a040a0', BRN: '#f08030', PAR: '#c8a818', SLP: '#8890a0', FNT: '#886060' };
    const heb = { PSN: 'רעל', BRN: 'אש', PAR: 'שתק', SLP: 'ישן', FNT: 'נפל' };
    ctx.fillStyle = COL.borderOut; rr(ctx, x - 1, y - 1, 24, 11, 3); ctx.fill();
    ctx.fillStyle = cmap[status] || '#888'; rr(ctx, x, y, 22, 9, 2); ctx.fill();
    FONT.center(ctx, heb[status] || status, x + 11, y + 1, '#f8f8f8', { noShadow: true });
  }
  function monIcon(ctx, speciesId, x, y, s = 16) {
    const spr = MONART[speciesId];
    if (spr) ctx.drawImage(spr, x, y, s, s);
  }
  const fmtMoney = n => n.toLocaleString('en-US') + ' שח';

  return { COL, panel, rr, text, wrap, say, closeBox, menu, ask, hpBar, expBar, hpColor, typeBadge, statusTag, monIcon, fmtMoney, BOX };
})();

  <script>
/* ============================================================
   OVERWORLD — movement, camera, NPCs, warps, encounters,
   trainer sight, interactions, and story scripts.
   ============================================================ */
const OW = (() => {
  const TILE = 16;
  const DIRV = { up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0] };

  let map = null, npcs = [];
  let mv = { moving: false, fx: 0, fy: 0, prog: 0, parity: 0, jump: false, run: false };
  let turnT = 0, lock = false, bumpT = 0;
  let rustles = [], emotes = [], stepFlag = false;

  function loadMap(id) {
    map = MAPS.M[id];
    G.map = id;
    npcs = (map.npcs || [])
      .filter(d => (!d.unless || !G.flags[d.unless]) && (!d.requires || G.flags[d.requires]))
      .map(d => ({ def: d, id: d.id, sprite: d.sprite, mon: d.mon, x: d.x, y: d.y, dir: d.dir || 'down',
                   moving: false, fx: d.x, fy: d.y, prog: 0, wait: ENG.ri(40, 160), gone: false }));
    rustles = []; emotes = [];
    AUD.music(map.music);
  }

  function npcAt(x, y) { return npcs.find(n => !n.gone && n.x === x && n.y === y) || null; }
  function itemBallAt(x, y) {
    const it = MAPS.itemAt(map, x, y);
    return (it && !G.flags[it.flag]) ? it : null;
  }
  function blocked(x, y, ignoreNpc) {
    const t = MAPS.tileAt(map, x, y);
    if (t.solid || t.ledge) return true;
    if (itemBallAt(x, y)) return true;
    if (!ignoreNpc && npcAt(x, y)) return true;
    if (G.x === x && G.y === y) return true;
    return false;
  }

  /* ---------------- player movement ---------------- */
  function tryMove(dir) {
    const [dx, dy] = DIRV[dir];
    const nx = G.x + dx, ny = G.y + dy;
    const t = MAPS.tileAt(map, nx, ny);
    if (t.ledge && dir === 'down' && !MAPS.tileAt(map, nx, ny + 1).solid && !npcAt(nx, ny + 1)) {
      mv = { moving: true, fx: G.x, fy: G.y, prog: 0, parity: 0, jump: true, run: false };
      G.x = nx; G.y = ny + 1;
      AUD.sfx('jump');
      return;
    }
    if (t.solid || t.ledge || npcAt(nx, ny) || itemBallAt(nx, ny)) {
      if (bumpT <= 0) { AUD.sfx('bump'); bumpT = 14; }
      return;
    }
    mv = { moving: true, fx: G.x, fy: G.y, prog: 0, parity: 1 - (mv.parity || 0), jump: false, run: ENG.btn('RUN') };
    G.x = nx; G.y = ny;
  }

  async function arrive() {
    stepFlag = true;
    const t = MAPS.tileAt(map, G.x, G.y);
    // grass rustle
    if (t.grass) rustles.push({ x: G.x, y: G.y, t: 16 });
    // warp
    const w = MAPS.warpAt(map, G.x, G.y);
    if (w) { await doWarp(w); return; }
    // scripted event tiles
    for (const ev of MAPS.eventAt(map, G.x, G.y)) {
      if (SCRIPTS[ev.script]) { await SCRIPTS[ev.script](ev); return; }
    }
    // wild encounter
    const enc = map.encounters;
    if (enc && (t.grass || enc.everywhere) && Math.random() < enc.rate && G.party.some(m => m.hp > 0)) {
      const zone = enc.zones.find(z => G.y <= z.maxY) || enc.zones[enc.zones.length - 1];
      const row = ENG.weighted(zone.table);
      const wild = DATA.makeMon(row[0], ENG.ri(row[1], row[2]));
      await startBattle({ kind: 'wild', wild });
      return;
    }
    // trainer line-of-sight
    await checkSight();
  }

  async function doWarp(w) {
    lock = true;
    if (w.door) AUD.sfx('door');
    await ENG.fadeOut(12);
    loadMap(w.to);
    G.x = w.tx; G.y = w.ty; G.dir = w.dir || G.dir;
    mv.moving = false;
    if (G.flags.starter) ENG.saveGame(); // autosave on every area change
    await ENG.fadeIn(12);
    lock = false;
  }

  async function checkSight() {
    for (const n of npcs) {
      const tr = n.def.trainer;
      if (!tr || n.gone || G.flags['tr_' + n.id]) continue;
      const [dx, dy] = DIRV[n.dir];
      for (let i = 1; i <= (n.def.sight || 4); i++) {
        const tx = n.x + dx * i, ty = n.y + dy * i;
        if (G.x === tx && G.y === ty) { await engageTrainer(n); return; }
        const tile = MAPS.tileAt(map, tx, ty);
        if (tile.solid || npcAt(tx, ty)) break;
      }
    }
  }

  async function engageTrainer(n) {
    lock = true;
    emotes.push({ npc: n, t: 45 });
    AUD.sfx('sel');
    AUD.music((n.def.trainer || '').startsWith('elite_') ? 'boss' : 'battle');
    await ENG.wait(48);
    // walk up to the player along the sight line
    for (let guard = 0; guard < 12 && Math.abs(n.x - G.x) + Math.abs(n.y - G.y) > 1; guard++) {
      const before = n.x + ',' + n.y;
      await stepNpc(n, n.dir);
      if (n.x + ',' + n.y === before) break;
    }
    faceEachOther(n);
    const t = DATA.TRAINERS[n.def.trainer];
    await UI.say(t.intro);
    const result = await startBattle({ kind: 'trainer', trainerId: n.def.trainer }, true);
    if (result.outcome === 'win') G.flags['tr_' + n.id] = true;
    else {
      // "בחירות חמישיות" — lose 5 times to the same opponent
      const k = 'losses_' + n.id;
      G.flags[k] = (G.flags[k] || 0) + 1;
      if (G.flags[k] >= 5 && SCN.checkAchievements) SCN.checkAchievements('lose5');
    }
    lock = false;
  }

  function faceEachOther(n) {
    if (n.x > G.x) { n.dir = 'left'; G.dir = 'right'; }
    else if (n.x < G.x) { n.dir = 'right'; G.dir = 'left'; }
    else if (n.y > G.y) { n.dir = 'up'; G.dir = 'down'; }
    else { n.dir = 'down'; G.dir = 'up'; }
  }

  /* ---------------- cutscene helpers ---------------- */
  function stepNpc(n, dir) {
    return new Promise(res => {
      const [dx, dy] = DIRV[dir];
      n.dir = dir;
      if (blocked(n.x + dx, n.y + dy)) { G._timers.push({ n: 2, r: res }); return; } // blocked: yield frames, no move
      n.moving = true; n.fx = n.x; n.fy = n.y; n.x += dx; n.y += dy; n.prog = 0; n.res = res;
    });
  }
  async function walkNpc(n, dir, steps) { for (let i = 0; i < steps; i++) await stepNpc(n, dir); }
  // greedy walk toward the player until adjacent; never hangs on obstacles
  async function approachPlayer(n) {
    for (let guard = 0; guard < 40; guard++) {
      const dx = G.x - n.x, dy = G.y - n.y;
      if (Math.abs(dx) + Math.abs(dy) <= 1) break;
      const prefer = Math.abs(dx) >= Math.abs(dy)
        ? [dx > 0 ? 'right' : 'left', dy > 0 ? 'down' : dy < 0 ? 'up' : null]
        : [dy > 0 ? 'down' : 'up', dx > 0 ? 'right' : dx < 0 ? 'left' : null];
      let moved = false;
      for (const dir of prefer) {
        if (!dir) continue;
        const [vx, vy] = DIRV[dir];
        if (blocked(n.x + vx, n.y + vy)) continue;
        const before = n.x + ',' + n.y;
        await stepNpc(n, dir);
        if (n.x + ',' + n.y !== before) { moved = true; break; }
      }
      if (!moved) break;
    }
  }
  function stepPlayer(dir) {
    return new Promise(res => {
      G.dir = dir;
      const [dx, dy] = DIRV[dir];
      mv = { moving: true, fx: G.x, fy: G.y, prog: 0, parity: 1 - (mv.parity || 0), jump: false, run: false, res };
      G.x += dx; G.y += dy;
    });
  }

  /* ---------------- battle wrapper ---------------- */
  async function startBattle(cfg, musicStarted) {
    const wasLocked = lock;
    lock = true;
    if (!musicStarted) AUD.music((cfg.trainerId || '').startsWith('gym_') || cfg.trainerId === 'champ_bibi' || cfg.kind === 'static' ? 'boss' : 'battle');
    await ENG.flashScreen(2, 4);
    await ENG.fadeOut(12);
    const result = await new Promise(res => ENG.push(BATTLE.scene(cfg, res)));
    AUD.music(map.music);
    await ENG.fadeIn(10);
    for (const evo of (result.evolveQueue || [])) {
      await new Promise(res => ENG.push(SCN.EvolveScene(evo.mon, evo.to, res)));
      AUD.music(map.music);
    }
    if (result.outcome === 'lose') await whiteout();
    lock = wasLocked; // restore the caller's cutscene lock
    return result;
  }

  async function whiteout() {
    const wasLocked = lock;
    lock = true;
    await UI.say('לא נשארו פוליטיקאים כשירים! הקואליציה של ' + G.name + ' התפרקה!');
    G.money = Math.floor(G.money / 2);
    await ENG.fadeOut(20);
    for (const m of G.party) { m.hp = m.maxhp; m.status = null; for (const mo of m.moves) mo.pp = mo.maxpp; }
    loadMap(G.healSpot.map);
    G.x = G.healSpot.x; G.y = G.healSpot.y; G.dir = G.healSpot.dir || 'down';
    await ENG.fadeIn(16);
    lock = wasLocked;
  }

  /* ---------------- interaction ---------------- */
  async function interact() {
    let [dx, dy] = DIRV[G.dir];
    let fx = G.x + dx, fy = G.y + dy;
    let t = MAPS.tileAt(map, fx, fy);
    let n = npcAt(fx, fy);
    if (!n && t.counter) { n = npcAt(fx + dx, fy + dy); } // talk across counters
    if (n) {
      lock = true;
      if (!n.mon) n.dir = { up: 'down', down: 'up', left: 'right', right: 'left' }[G.dir];
      const d = n.def;
      if (d.trainer && !G.flags['tr_' + n.id]) { lock = false; await engageTrainer(n); return; }
      if (d.trainer && G.flags['tr_' + n.id]) {
        await UI.say(DATA.TRAINERS[d.trainer].name + ': ' + DATA.TRAINERS[d.trainer].lose);
      } else if (d.script && SCRIPTS[d.script]) {
        await SCRIPTS[d.script](n);
      } else if (d.lines) {
        for (const line of d.lines) await UI.say(line);
      }
      lock = false;
      return;
    }
    // interactable event tiles (e.g. starter capsules on the lab table)
    for (const ev of MAPS.eventAt(map, fx, fy)) {
      if (ev.facing && G.dir !== ev.facing) continue;
      if (SCRIPTS[ev.script]) {
        lock = true;
        await SCRIPTS[ev.script](ev);
        lock = false;
        return;
      }
    }
    const key = fx + ',' + fy;
    if (t.sign && map.signs[key]) {
      lock = true;
      await UI.say(map.signs[key].join('\n'));
      if (G.map === 'thistleton' && key === '19,9' && !G.flags.trump_found) {
        G.flags.trump_found = true;
        AUD.sfx('ok');
        await UI.say('משהו נקיש מאחורי השלט... דלת זהב ענקית נפתחת בחריקה!');
        await UI.say('(הכניסה למגדל טראמפ נפתחה — הצעד על האריח שממזרח לשלט)');
      }
      lock = false; return;
    }
    const it = MAPS.itemAt(map, fx, fy);
    if (it && !G.flags[it.flag]) {
      lock = true;
      G.flags[it.flag] = true;
      G.bag[it.item] = (G.bag[it.item] || 0) + 1;
      AUD.jingle('itemJ');
      await UI.say(G.name + ' מצא ' + DATA.ITEMS[it.item].name + '!');
      lock = false; return;
    }
    if (t.bed) {
      lock = true;
      const yes = await UI.ask('המיטה נראית נוחה. לנמנם קצת?', ['כן', 'לא']);
      if (yes === 0) {
        await ENG.fadeOut(20); await ENG.wait(20);
        for (const m of G.party) { m.hp = m.maxhp; m.status = null; for (const mo of m.moves) mo.pp = mo.maxpp; }
        AUD.jingle('heal');
        await ENG.fadeIn(20);
        await UI.say(G.name + ' התעורר רענן! כל הקואליציה במצב מעולה!');
      }
      lock = false; return;
    }
    const ch = MAPS.charAt(map, fx, fy);
    if (ch === 'W') { lock = true; await UI.say('המים רגועים. מישהו זרק לשם קורקינט.'); lock = false; }
    if (ch === 'V') { lock = true; await UI.say('בטלוויזיה: פאנל פרשנים צועקים. אף אחד לא מקשיב לאף אחד.'); lock = false; }
    if (ch === 'B') { lock = true; await UI.say('מדפים עמוסי פרוטוקולים של ועדות. רובם לא נקראו מעולם.'); lock = false; }
    if (ch === 'K') { lock = true; await UI.say('מכונה משוכללת מזמזמת. כתוב עליה: "לא לגעת — תקציב המדינה".'); lock = false; }
  }

  /* ---------------- gym ladder helper ---------------- */
  async function gymFight(tid, flag, badgeName, afterLine) {
    lock = true;
    const t = DATA.TRAINERS[tid];
    if (G.flags[flag]) { await UI.say(t.name + ': ' + badgeName + ' כבר אצלך. תמשיך לטפס.'); lock = false; return; }
    await UI.say(t.intro);
    const res = await startBattle({ kind: 'trainer', trainerId: tid });
    if (res.outcome === 'win') {
      G.flags[flag] = true; G.badges.push(badgeName);
      AUD.jingle('badge');
      await UI.say(G.name + ' קיבל את ' + badgeName + '!');
      if (afterLine) await UI.say(afterLine);
      SCN.checkAchievements && SCN.checkAchievements('badge');
    }
    lock = false;
  }

  /* ---------------- story scripts ---------------- */
  const COUNTER_STARTER = { OZERMON: 'MITMAHMON', MITMAHMON: 'YOETZMON', YOETZMON: 'OZERMON' };
  const SCRIPTS = {
    async needStarter() {
      if (G.flags.starter) return;
      lock = true;
      await UI.say('קול קורא: עצור! מסוכן לצאת מהעיר בלי פוליטיקאי משלך!');
      await UI.say('גש קודם לפרופסור בג״ץ בלשכה עם הגג האפור, בצד המזרחי!');
      await stepPlayer('down');
      lock = false;
    },
    async mom(n) {
      lock = true;
      if (!G.flags.starter) {
        await UI.say('אמא: ' + G.name + ', פרופסור בג״ץ חיפש אותך! הוא בלשכה עם הגג האפור.');
        await UI.say('אמא: אומרים שיש לו שלושה פוליטיקאים צעירים... איזה מלחיץ!');
      } else {
        await UI.say('אמא: כבר חזרת? תראה את הקואליציה שלך... הם מעריצים אותך!');
        await UI.say('אמא: תנוח במיטה מתי שבא לך, מתוק. ותחליף גרביים!');
      }
      lock = false;
    },
    async prof() {
      lock = true;
      if (!G.flags.starter) {
        await UI.say('בג״ץ: ' + G.name + '! תזמון מושלם. אני חוקר איך אזרחים ופוליטיקאים מסתדרים ביחד. עד היום — לא מצאתי.');
        await UI.say('בג״ץ: שלוש הקלפיות על השולחן מכילות פוליטיקאים צעירים שגידלתי בעצמי.');
        await UI.say('בג״ץ: קח אחד — זה חוקתי. רק זכור: כוחו של הפוקימון מוגבל. כך גם שלי.');
      } else if (!G.flags.badge1) {
        await UI.say('בג״ץ: איך מתקדם ' + DATA.SPECIES[G.flags.starter].name + '? קח את כביש 1 לירושלים — המכון הראשון של מאי גולן מחכה שם. ואז הדרום, הצפון, המליאה...');

  /* ---------------- scene ---------------- */
  const scene = {
    opaque: true,
    update() {
      bumpT--;
      // rustle / emote timers
      for (let i = rustles.length - 1; i >= 0; i--) if (--rustles[i].t <= 0) rustles.splice(i, 1);
      for (let i = emotes.length - 1; i >= 0; i--) if (--emotes[i].t <= 0) emotes.splice(i, 1);
      // player move progress
      if (mv.moving) {
        const speed = mv.jump ? 2 : G.riding ? 3.2 : mv.run ? 2.3 : 1.3;
        mv.prog += speed;
        const goal = mv.jump ? 32 : 16;
        if (mv.prog >= goal) {
          mv.moving = false;
          const res = mv.res; mv.res = null;
          if (res) res();
          else arrive();
        }
      } else if (!lock) {
        const d = ENG.dirPressed();
        if (turnT > 0) turnT--;
        if (d) {
          if (d !== G.dir) { G.dir = d; turnT = 5; }
          else if (turnT <= 0) tryMove(d);
        }
        if (ENG.btnp('A')) interact();
        else if (ENG.btnp('START')) { AUD.sfx('ok'); ENG.push(SCN.PauseMenu()); }
      }
      // NPC idle behaviour
      for (const n of npcs) {
        if (n.gone) continue;
        if (n.moving) {
          n.prog += 1;
          if (n.prog >= 16) { n.moving = false; if (n.res) { const r = n.res; n.res = null; r(); } }
          continue;
        }
        if (lock || n.def.move === 'static') continue;
        if (--n.wait > 0) continue;
        n.wait = ENG.ri(70, 200);
        if (n.def.move === 'turn') n.dir = ENG.pick(['up', 'down', 'left', 'right']);
        else if (n.def.move === 'wander') {
          const dir = ENG.pick(['up', 'down', 'left', 'right']);
          const [dx, dy] = DIRV[dir];
          const nx = n.x + dx, ny = n.y + dy;
          const home = n.def;
          if (Math.abs(nx - home.x) > (home.radius || 1) || Math.abs(ny - home.y) > (home.radius || 1)) { n.dir = dir; continue; }
          if (blocked(nx, ny) || MAPS.warpAt(map, nx, ny)) { n.dir = dir; continue; }
          n.dir = dir; n.moving = true; n.fx = n.x; n.fy = n.y; n.x = nx; n.y = ny; n.prog = 0;
        }
      }
    },

    draw(ctx) {
      if (!map) return;
      const ppx = drawPosX(G.x, mv), ppy = drawPosY(G.y, mv);
      let camX = Math.round(ppx - G.W / 2 + 8), camY = Math.round(ppy - G.H / 2 + 8);
      camX = Math.max(0, Math.min(map.w * TILE - G.W, camX));
      camY = Math.max(0, Math.min(map.h * TILE - G.H, camY));
      if (map.w * TILE < G.W) camX = (map.w * TILE - G.W) / 2;
      if (map.h * TILE < G.H) camY = (map.h * TILE - G.H) / 2;

      // pre-rendered HD ground layer (autotiles, buildings, water/flower anim)
      HD.ground(ctx, map, camX, camY);
      // ground items
      for (const it of (map.items || [])) {
        if (G.flags[it.flag]) continue;
        HD.shadow(ctx, it.x * TILE - camX + 8, it.y * TILE - camY + 14, 10);
        ctx.drawImage(SPR.T.ballGround, it.x * TILE - camX + 3, it.y * TILE - camY + 4);
      }
      for (const dec of (map.decorations || [])) {
        if (dec.unless && G.flags[dec.unless]) continue;
        if (dec.type === 'ball') ctx.drawImage(SPR.T.ballGround, dec.x * TILE - camX + 3, dec.y * TILE - camY + 1);
      }
      // rustles
      for (const r of rustles) {
        if (r.t > 8) continue;
        ctx.drawImage(SPR.T.rustle, r.x * TILE - camX + 4, r.y * TILE - camY + 10);
      }
      // soft shadows for everything that stands on the ground
      const treeList = HD.treesInView(map, camX, camY);
      for (const t of treeList) HD.shadow(ctx, t.x * TILE - camX + 8, t.y * TILE - camY + 13, 15, 7);
      for (const n of npcs) if (!n.gone) HD.shadow(ctx, drawPosX(n.x, n) - camX + 8, drawPosY(n.y, n) - camY + 13, 11);
      if (!(mv.moving && mv.jump)) HD.shadow(ctx, ppx - camX + 8, ppy - camY + 13, 11);
      // entities sorted by y (trees join the sort so canopies overlap correctly)
      const ents = [];
      for (const t of treeList) ents.push({ y: t.y * TILE, draw: () => HD.drawTree(ctx, t, camX, camY) });
      for (const n of npcs) if (!n.gone) ents.push({ y: drawPosY(n.y, n), draw: () => drawNpc(ctx, n, camX, camY) });
      ents.push({ y: ppy, draw: () => drawPlayer(ctx, camX, camY, ppx, ppy) });
      ents.sort((a, b) => a.y - b.y);
      for (const e of ents) e.draw();
      // grass overlay on entities standing in tall grass
      for (const n of npcs) if (!n.gone && !n.moving && MAPS.tileAt(map, n.x, n.y).grass)

        ctx.drawImage(HD.tallGrassTop, G.x * TILE - camX, G.y * TILE - camY, TILE, TILE);

      for (const e of emotes) {
        const n = e.npc;
        ctx.drawImage(SPR.T.emote, drawPosX(n.x, n) - camX + 4, drawPosY(n.y, n) - camY - 16);
      }
      // atmosphere
      if (map.outdoor) { HD.clouds(ctx, map, camX, camY); HD.grade(ctx); }
      // cave darkness vignette (with a gentle lantern flicker)
      if (map.dark) {
        ctx.save();
        const flick = Math.sin(G.frame / 9) * 2.5 + Math.sin(G.frame / 23) * 2;
        const grad = ctx.createRadialGradient(ppx - camX + 8, ppy - camY + 8, 28 + flick, ppx - camX + 8, ppy - camY + 8, 108 + flick);
        grad.addColorStop(0, 'rgba(6,2,0,0)');
        grad.addColorStop(0.55, 'rgba(8,4,4,0.28)');
        grad.addColorStop(1, 'rgba(4,2,10,0.82)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, G.W, G.H);
        // warm lantern tint near the player
        const warm = ctx.createRadialGradient(ppx - camX + 8, ppy - camY + 8, 4, ppx - camX + 8, ppy - camY + 8, 44);
        warm.addColorStop(0, 'rgba(255,180,90,.14)'); warm.addColorStop(1, 'rgba(255,180,90,0)');
        ctx.fillStyle = warm; ctx.fillRect(0, 0, G.W, G.H);
        ctx.restore();
      }
    },
  };

  function drawPosX(x, m) {
    if (!m || !m.moving) return x * TILE;
    const goal = m.jump ? 32 : 16;
    return m.fx * TILE + (x * TILE - m.fx * TILE) * (m.prog / goal);
  }
  function drawPosY(y, m) {
    if (!m || !m.moving) return y * TILE;
    const goal = m.jump ? 32 : 16;
    return m.fy * TILE + (y * TILE - m.fy * TILE) * (m.prog / goal);
  }

  function drawScooter(ctx, x, y) {
    ctx.fillStyle = '#2a2a34'; ctx.fillRect(x + 2, y + 17, 12, 2);            // deck
    ctx.fillStyle = '#40b8c8'; ctx.fillRect(x + 2, y + 17, 12, 1);            // deck top
    ctx.fillStyle = '#16161e';

    ctx.beginPath(); ctx.arc(x + 12.5, y + 19.5, 2, 0, 7); ctx.fill();
    ctx.fillStyle = '#8a8a98'; ctx.fillRect(x + 3, y + 19, 1, 1); ctx.fillRect(x + 12, y + 19, 1, 1);
    if (G.dir === 'left' || G.dir === 'right') {
      const sx2 = G.dir === 'right' ? x + 13 : x + 2;
      ctx.fillStyle = '#3a3a46'; ctx.fillRect(sx2, y + 9, 1, 8);              // stem
      ctx.fillRect(sx2 - 1, y + 9, 3, 1);                                     // handlebar

  }
  function drawPlayer(ctx, camX, camY, ppx, ppy) {
    const sheet = SPR.CHR.hero[G.dir];
    let frame = 0;
    if (mv.moving && !mv.jump) frame = (mv.prog < 8) ? (mv.parity ? 1 : 2) : 0;
    if (G.riding) drawScooter(ctx, Math.round(ppx - camX), Math.round(ppy - camY - 4));
    let z = 0;
    if (mv.moving && mv.jump) {
      const t = mv.prog / 32;
      z = Math.sin(Math.PI * t) * 12;
      ctx.drawImage(SPR.T.shadow, Math.round(ppx - camX), Math.round(ppy - camY + 12));
      frame = 1;
    }
    ctx.drawImage(sheet[frame], Math.round(ppx - camX), Math.round(ppy - camY - 4 - z), 16, 20);
  }
  function drawNpc(ctx, n, camX, camY) {
    const nx = drawPosX(n.x, n) - camX, ny = drawPosY(n.y, n) - camY;
    if (n.mon) {
      const bob = Math.sin(G.frame / 24) * 1.5;
      ctx.drawImage(SPR.T.shadow, Math.round(nx), Math.round(ny + 10));
      ctx.drawImage(MONART[n.mon], Math.round(nx - 4), Math.round(ny - 10 + bob), 24, 24);
      if ((G.frame >> 4) % 3 === 0) ctx.drawImage(SPR.T.sparkle, Math.round(nx + 12), Math.round(ny - 12 + bob));
      return;
    }
    const sheet = SPR.CHR[n.sprite] || SPR.CHR.kid;
    let frame = 0;
    if (n.moving) frame = (n.prog < 8) ? 1 : 0;
    ctx.drawImage(sheet[n.dir][frame], Math.round(nx), Math.round(ny - 4), 16, 20);
  }

  return {
    scene, loadMap, startBattle, whiteout, SCRIPTS,
    get map() { return map; }, get npcs() { return npcs; },
    get locked() { return lock; }, set locked(v) { lock = v; },
  };
})();

        else { p.x += p.vx || 0; p.y += p.vy || 0; if (p.g) p.vy += p.g; }

        } else if (p.star) {

    function effStat(side, key) {

    function calcDamage(atkSide, defSide, move) {
      const mv = DATA.MOVES[move.id];
